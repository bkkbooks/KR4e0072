body:
  text: 全室外集巻一明釋宗泐撰欽和御製暑月民勞律詩一首田夫豈暇納微凉赤日流金數畆秧自是吾皇能體物極知黎庶有飢腸萬家共仰秋成富百世先培國本强白首方袍無用客獨於林下和宸章欽和御製思親懷古律詩二首𤣥堂冬日尚𤣥衣獨有思親外萬㡬虞帝泣天當雪鬢漢皇歸沛度河磯中都勝地疎遊幸大孝終身靡間違天下蒼生欽聖化老臣寧不念庭闈海内承平有底愁皇陵松栢老園丘滁山南去闗門壯淮水西來郭外流轉眼光隂三十載興王事業百千秋中都父老頭如雪長望龍輿此地遊欽和御製大将征回朔漠空虗二首萬姓謳歌朔漠清都縁聖主有經營北邊自古存甌脫瀚海于今屬大明鴻鴈三秋隨入塞風雲萬里擁歸旌漢家曽奏無人曲未若天朝此一征百萬旌旗蔽野隂聮翩戈甲耀南金一朝白草無秋牧千里黒松空舊林追敵不知飛騎逺下營俄見湧泉深將軍功業過前代刻石天山第幾岑欽和御製江東橋詩玉作䦨干石作梁銀河清夜共輝光經營自出天工妙鎪琢仍歸匠者良大駕親臨觀氣象羣臣載拜獻詞章誰知千古不磨跡地久天長轉更彰石梁髙架奠長江要路通津捴帝鄉一代規模天廣大萬年功業日昭彰吾皇製作親曾賜臣下賡歌孰敢當聖子神孫承大統願言鴻祚永延昌欽和御製山居詩賜靈谷寺住持松風蘿月滿禪房物外髙情孰可當鳥為銜花渾不恐因暖足自相忘峯巒重繞何深䆳樓閣新開更煒煌勑賜良田供萬衲不須日糴太倉粮城外重岡一逕㣲中開寶刹獨巍巍松根燕坐雲生石廡下經行月到扉問答箭鋒能破的嚬呻師子不藏威幾多不解知端的水潦鶴云諸佛機紺宫勝槩自天工大士中居鏡作容松頂月來多伴鶴巖前雲起忽從龍奎文勝似珠千斛寵賜過於粟萬鍾僧逺不知天仗到時人錯道有髙風刹幢髙出衆峰巔禪者家風靜處便世上塵埃千市合谷中花木四時鮮幽深共仰慈光溥愚懦咸資化力全為報學流心是佛著鞭當在祖生先山林麋鹿性相便稱意何須負郭田掛樹獼猴常近席散花仙侶不離筵半窻梅月清宵梦一榻松風白晝禪慧約草堂渾忘却獨於相府住多年鐵錫初將壁上懸聖恩容我此安禪曉看草木霑多露夜睡星河近九天石與道心無動日樹同僧臈不知年請看八徳池中水一洗勞生累刼愆誰識千峰頂上幽羚羊挂角沒踪由談𤣥自折松為拂遇困聊將石枕頭寒谷花開多向日空巖葉落始知秋莫言與世相疎甚此是山居道者流偶向溪頭坐石磯水禽沙烏自相依敢言有道忘人境秖欲無心契祖機莎草似茵迎日軟荻芽如玉到春肥巖扉半掩歸來後步屧修廊月色㣲新到山居興趣多松門盡日客稀過經行偶見巖花落睡起忽聞山鳥歌㨗徑固非今世有移文爭奈昔人何老來已得安心法一念纔生即是魔開善堂前長緑蘿欲探遺跡興蹉跎一千年事猶堪舉十二時辰尚可歌送供天人曽雜沓分身街市自婆娑今朝寶塔移東嶺更覺山林氣槩多通𤣥有路好追遊須踏毘盧頂上頭薦福古公言莫莫桐城投子道油油溟濤終見鵾鵬化枳棘徒聞鳥雀啾一墮聲塵忘歸客寒巖虚坐幾春秋欽和御賜詩一首奉詔歸來第一禪禮官引拜玉階前恩光更覺今朝重聖量都忘舊日愆鳳閣鐘聲催曉旭龍池柳色弄晴烟有懷報效慙無地智水頻澆道種田欽和御賜詩廿字宫殿雲霄近山林雨露深九重明主意一寸老臣心欽和御賜淮逰行初作淮南賔空山隔蹄輪烟霞淡為侶水石清相親結茅有餘地風雪忘苦辛或來野人服亦有居士巾饋糧稍相繼倐忽踰三春雨露滋萬彚巖壑容此身常欲息諸見以之空六塵種蓮一池小引泉清澗濵丹書俄逺召殊恩異兩人再瞻鴛鷺序永辭麋鹿隣不願東歸越不願西入秦但願居轂下終身荷皇仁大哉乾坤内何物非陶鈞欽和御賜詩天街春曉踏㣲霜觀闕嵳峩首屡昻品彚捴承陽氣早賡歌敢頌聖躬康御溝緑轉千條柳齋室烟浮百和香有道年年登黍稷歲星不獨在金穰欽和御賜復住持善世新寺詩一首松下閒居幾度秋燈前顧影獨無儔遣情不似圓通輩談病何如積翠流毎愧向來多寵賜豈圖今日更推優此恩此意誠難報惟演真乗讃化猷奉制賦靈谷寺住持濬天淵三首聖朝新建鍾山寺此日禪翁奉詔居雲漢載瞻仙闕近山林大啓法筵初世縁隨順心無著靜地重修趣有餘萬籟不生鐘鼔寂一堂松月夜窻虚五年闕下預朝班新奉綸音又住山覺苑喜逢今日盛道林行見古風還豈惟行業髙流輩更有才名動世間五色奎文曾賜與朝回擎出九重闗入門撾鼓便陞堂龍象筵中聽舉揚最上宗乗開後學無邊壽量祝吾皇人心都與天心合法運將隨國運昌從此山林增氣槩松頭白鶴也低昻應制詠鍾山老僧雪中早朝鍾山禪客早朝天毳衲披來雪半肩好似解空無住著龎眉皓首玉階前應制賦無事出山白雲巖壑自幽閒偶被天風引出山本是無心亦無事曉來只欲近龍顔應制賦甘露詩十二韻天地清寧日時和歲又豐側聞甘露下近自禁城東淅瀝浮松上晶熒絢日中圓明珠的皪透暎玉玲瓏喜訝霜初結驚看雪未融竒祥慶雲類嘉應醴泉同競采千官合髙擎衆騎叢獻當青𤨏闥覆以碧紗籠勝味醍醐劣清光沆瀣空薦豋先祖考分賜及王公載筆歸青史歌詩付樂工敢隨鴛鷺序稱頌未央宫全室外集巻一
