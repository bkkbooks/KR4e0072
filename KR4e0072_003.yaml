body:
  text: 全室外集卷三明釋宗泐撰五言古詩寶訓堂聖君體皇極建國封親王全蜀形勝地西南控戎羌劍閣天下壯象馬稱瞿唐堡障千萬祀崇德乃安康昭鑒有嚴訓寶之靡或忘服御既有節出入亦有常上承宗廟重下垂𦙍祚長開門看天宇白日行穹蒼中宵卷簾坐仰視北斗光羮墻契王意一飯在斯堂喜清逺兄至以齊已詩長憶舊山日與君同聚沙十字為韻一别動二紀纍念山海長何期風雪裏來此溪上航乍見如不識大喜忽欲狂燈花解人意今夕爛生光因亂阻殊邦及見消往憶始愛道貌清復驚鬢毛白論新無少歡話舊有深惻坐久忽忘言芳梅照寒席前年浙僧來稍稍聞去就持斧住越山移幢入吳岫髙居既鄰支朗詠亦依晝應世自無心麻衣淡如舊今年逺書至念我戀兹山如魚在池沼江海忘往還不才負髙誼此生多厚顔惟思拂衣好老去一身閒昔事龍河師法筵全盛日童年與君居衆訝早入室回首白日飛浩劫彈指疾平生竟何為志願良未畢良友平生親風塵散何許草莽或零落雲霄亦鶱舉天地日凄凉折芳欲誰與所嗟芙蓉花白露下秋浦昔下廬山雲停橈宛水濆咫尺不我見千里長思君却寄千金劍寒光動星文至今在篋笥騰氣時絪緼少年同居日聞君拂絲桐髙齊月照席兩耳生秋風當時青雲士竒文詠空同往事春花歇江水今自東人生空中雲東西散復聚古來賢達輩何曾定出處乘流任所之遇險從自阻今日偶重逢相看復何語同遊賞溪曲清興浩無涯澄潭㺯新渌芳蹊踏晴沙緣崖采秋菊搴林摘春茶留連此中意當期歲月賖懷以仁講師入觀圖旭日千萬峰白雲三四朵一笑山容開獨自松下坐瀑流天上來飛花面前墮此時中觀成無物亦無我霅上題青山書舍圖為周伯陽作春日遊苕霅復兹對畫圖青山白雲際緑樹幽人廬衆芳生澗曲新泉落巖趺不見黃叔度東風忽愁豫雜詩十一首少小薄世榮雲泉寄幽賞冉冉三十年誤身墮塵網流形大化內萬古同羈鞅得中久已安遺外非所强但望還山雲時時結遐想婆娑雙桂樹芳枝春正長自我來涇川星歲已再周託兹山水勝謂可成遲留奈何外物牽撫事心悠悠久知世道惡奚事仍夷猶璚林有竒鶴未嘗識羅罦翩然覔靈鳳接翅昆侖丘羣邪可干正衆枉能矯直蕭條孤生篁隱忍在叢棘白璧竟何愆青蠅自懷慝公論茍不存孰辨夷與跖伯陽西度關仲尼東浮海道大無所容一身置何在蘭蕙秋風前芳香竟誰采天道自茫茫知命不復悔栖栖止百年赫赫向千載呂梁險可逾大行危可陟如何方寸間中自多荆棘尊前生白刃舟中起敵國一感睚眦瞋報之甚仇隙咄嗟難與居俯仰隘八極思欲凌風翔恨無凌風翼猛虎出深山往往多渴飢居然肆彼惡隳突當九逵機檻素弗設赤手安可羈衝颷激修坂白日翳隂霾吾思陽羡子延佇心凄其夜久無與適塊然坐空堂白鳥一何多營營來我傍靜言聊假寐遂以襲單裳噆膚猶可忍聒耳諒難當晨星耀東廡明月度西廂念爾能幾何滅跡於朝陽福禍無定在倚伏誰先知於事既難料在理亦罔推西伯稱大聖羑里却見縻况居千載下風教日已衰願君略形纍所存心不欺魯連天下士片言能解紛千金博一笑永絶平原君髙蹈東海上卷舒若浮雲清風散八表繼者今誰聞四月維孟夏六陽云已盈靡草夕凋瘁螻蟈晨悲鳴運序迭衰王萬彚紛枯榮斯理信昭灼君子冝守貞清晨曲肱卧夢升華頂岑殊庭就巖構左右修竹林仙人五六輩列坐調玉琴莞然顧我笑子獨何苦心石梁有縣水濯此塵中襟氷雪窩道人氷雪窩巖栖稱岑寂洞門白日隂三徑青苔色片雲簷外生落葉階前積更深芋火紅晝靜茶烟碧淡泊中自怡安居無不適彼美西方人時時勞念憶送裕上人歸天台我家赤城東不識華頂嶠逺道送君歸昨夜夢中到崖泓有泉瓢竹室留茶竈珍重山中人拂衣願同調梅詠天寒清澗阿貞姿照氷雪幽賞衆莫同孤芳為誰發東園桃李春簫鼓夕猶咽君子天一涯微香坐消歇送銛上人省親青山淡斜暉驚風在髙樹行客起遐思雙親髮垂素雲飛滄海遙雁下寒空暮老來惟夢歸隨君故鄉路題五龍山房圖剡中東南竒若人緇侶勝一住忽十年禪房得深靜髙扉敞重崖修橋入危磴林端識名香水際聞清磬微茫度雲壑掩映披華徑長松支遁吟盤石曇猷定别來幾夢思遊塵生麈柄晨窗對新圖蕭條發孤詠春雨吟驅車涉泥坂首路流大河河水際天白飄風激層波神龍不安處作橫鯨與鼉强暴相啖噬纖鱗其如何感此吾安適旋駕西山阿碩人不敢擬考槃有遺歌溪南有竒山不見二十日今朝雲忽去天髙數峰出東風晚生寒細雨又復密坐觀微霧升化作白練羃側想巖居人林卧頭不櫛崖滑徑且暗何由采芝术桓茂倫詩并序豫所居水西寺右有山曰湖山晉宣城內史贈太常桓簡公彛之廟在焉頃余嘗讀晉史愛其人致死王事志節可尚遂造其祠作詩弔之晉氏中遷播期運仍遘屯奸雄覬周鼎聮翩起峻敦伊人抱中和徑節凌秋旻骯髒救國難捐軀遂成仁方其少孤日識鑑夙有聞髙追郭許迹逈邁周庾塵逮夫職常侍密謀佐戎軒皇綱藉輔翼男爵示公勤簡才鎮宣郡王室得屏藩抗表非所任乃獲依先墳未幾豺虎橫長驅逼帝閽紏衆前赴敵誓欲如鷹鸇一聞王師潰流涕下沾巾僞和安忍垢壯氣雄九軍朱生既效力俞子亦懷恩時哉久失利力屈涇川濆𤣥兆誠不謬果爾符景純世和倡髙義收胔歸下泉巖巖太常贈燁燁光前文時有卞都督方駕揚清芬後來冨瓜瓞挾貴負崇勛夫何忝令德逆節生君門昔余探古史掩卷思其人兹焉董山寺華祠照西鄰是邦足遺愛炳煥圖像存蘋蘩纍登薦簫鼓無冬春私𠂻若神契酌水酹忠魂雲屏下雜沓徒御來駿奔微生久息影於世無戚欣因君激五內慷慨著斯言病中作此疾從何生形容遽憔悴默默求其端體弱易為致始受寒熱攻恍然若沉醉兀坐强自持倒卧終不寐朝聞樹間蟬意覺秋風至夜窗月逾明悲蛩攪情思嘗窺衛生術吐納運六氣呼童具杵臼稍復親藥餌今辰眼忽明展書識文字起繞中庭行兩足如重膇况逢亢陽災髙旻尚炎熾粳稻化為茅糲食恐不備一身固多患又復念時事不到無生域空為有形纍雷氏逸清堂逸人在山澤境靜心自清樹堂不必廣取適三四楹几席何所有圖書浩縱橫尊罍時復具客至輒與傾東風散庭樹衆鳥相和鳴髙歌有至樂所樂非世情食薇卧首陽空留苦節名舊衣起草廬勛業竟何成士師與乘田行義不在榮嗟嗟雷夫子吾知得其生斸黃獨雨歇林氣凉草沒澗西路荷鉏入深幽石邊欣一遇長歌對白雲清風滿山樹向來垂涕人遙遙千載慕采芹深渚芹生密淺渚芹生稀采稀不濡足采密畏沾衣凌晨携筐去及午行歌歸道逢李將軍馳獸春乘肥霜下菊英英當窗菊獨於霜下妍誰知婉娩姿中自抱貞堅衆卉值陽和競媚東風前當時豈不好于今乃凄然昔人曽謂此能為制頽年吾生寧復爾但用寫幽悁西澗獨行憶相空今旦風日好獨尋西澗行叢梅未盡拆幽蘭已復生樹頭暖光泛石罅新泉鳴遇境意自適思與良友并冬夜憶清逺道初二兄夜深霜氣寒窗月皎如燭鳴鴻尚遐征孤鶴亦驚宿念我平生親悵焉動心曲四明是何處苕溪如在目異方詎能通逺道何由縮十年無一字信是如金玉白髮漸欺人晤言安可卜寓興水草冬不死豈為寒所侵巖松風力徑歲暮青滿林念彼苦節士艱難持素心雖存太古操惜哉無知音守中固有道庶為君子欽無㫖兄將歸番昜龍臺寺遂用宋洪內翰遊兹寺韻賦古詩一首以贈十年兩情展一旦千里違念此俱皓首晤言寧有時楚天眇無際孤雲杳難期故山樟樹老秋風亦剛薇舊房兵後在勝侶存者稀諸孫新入道迎歸候傳衣蘭窗詩為戴原忠賦蘭生在深谷獨負幽貞姿一䝉君子賞遂與巖壑辭移植南窗下靡靡生華滋緑葉承曉露微香散清颸美人結新愛似遇深相知取適㑹良友怡情吐芳詞自登柏臺選經歲忽若遺常恐霜霰侵復畏蔓草欺擷英欲為佩青年阻良期異鄉不可見天長有餘思酬張來儀見寄東閣日無事能枉野人書坐想西巖菊寒花媚秋餘闐闐車馬道赫赫王侯居寂寞揚子雲遊心在𤣥虛監齊詩贈毛起宗禱晴嚴祀典名山啓靈壇奏章通玉帝環珮集仙官祥光紛下燭誠心馳上干瑶空景方霽金漏夕未䦨衆職或少怠飛文遂清彈居然執法吏凛若秋霜寒沉沉虎豹户肅肅獬豸冠始知天人際監齊良獨難風雪歸莊圖山路獨歸翁手携一壺酒千林雪正深扁舟在溪口茅茨闞石根垂蘿穿户牖江城看圖人幾回興嘆久辛亥新歲程處士見過常孰别墅臨别賦詩獻歲春未回風雨連十日荒村少朋歡窮巷絶人跡程君泛扁舟茅齊破幽寂逺來見真情欵言忘永夕顧惟艱難際出處各有役世紛日相纒誰能念疇昔因君尚道誼臨别增太息獨棹去茫茫空瞻海虞碧莫過賞溪日莫衆鳥歸孤雲亦還山市人爭渡息小舟沙際閒我屋西峰下半出青林間鐘聲動深念無為尚塵寰雜詩落葉委通衢紛然無人掃但覩新行迹不見舊時道古木倚道旁亂藤絡其杪歲暮雖青青終非本容好世人懷往途悟此苦不早振衣無後期來從漢隂老夏夜與錢子貞坐西齊以欲覺聞晨鐘令人發深省之句為韻各賦詩以敘㑹别之意一見江海竒夙聞鐘鼎傲山靈訝雄談木客爭清嘯悠悠鹿門期落落東海蹈笑問經世人大夢誰先覺明月不可招流光入堂中白雲不可約掛我屋上松兹㑹固難得後㑹寧易逢明朝在東郭隔水但聞鐘無能甘寂寞息影在山深采薇東谷口汲泉西澗潯朝隨白雲往夕伴清猿吟他時倘相憶遺我天外音曲池難容舠狹路不可騁萬事付一默閉關深自省魚行不動波鳥飛無遺影何處未忘情月白空山靜題山水圖辭山始兼旬見山心輒喜披圖忽悄然舊遊宛相似微茫敬亭雲迢遞賞溪水猿啼樹蒼蒼漚泛波靡靡巖阿桂叢生茅屋無人理何為滯江城眯眼黃塵起奉和劉彥基待相空至實公同門英論交二十載賦詩多新語亦足邁前代偶與仙翁言久别思一㑹溪山入春明花烏亦相待孤雲本無期行蹤定何在日暮倚東風踈鐘起天外答夏景瞻昔居賞溪曲怵迫靡所侵衲衣掛石壁燕坐長松隂子來慰幽寂語合相知深孤雲十年别明月千里心而我亦何事投迹此禪林向來結茅地回首空青岑寧知江海逺遇子復在今百挫志矯矯猶能發狂吟清辭入古調一鼓薰風琴吁嗟衆響作過耳無留音柯生耕讀軒耕田村外歸抱書窗下讀讀書期業成耕田待秋熟一飯充朝飢所願良亦足聖賢日相親志不在干祿白水涵春陂青燈照茅屋寵辱吾不知門前羽山緑贈畦樂翁開圃藝嘉蔬芳畦繞茅屋春雨昨夜來滿眼浮新緑短鋤日已携不課兒與僕但知此中趣餘外非所欲陶令頗從容董生何局促浩歌對青山孤雲暮歸麓裴季和著存堂白日山下沒長江天際流思親無時已寸心良悠悠髙堂親所憩虛榻經幾秋桑梓必恭敬况此今尚留憶昔具慶日艱難進庶羞吁嗟受君祿庭樹風颼颼分題八功德水送人歸金華鍾山祇樹園中涵一池碧貯滿忽若虛測深杳無極遙通太液波近映寶珠色八德類淨區竒蓮育靈質屢同金華彥煩襟時一滌垂筒汲清甘煮茗松月夕今朝惜分袂對此翻不懌歸弄雙溪流應思池上客朝陽軒開軒面東旭晴光絢蒲座霜顱眼倍明壞衲如雲破乞來五色帛針線堪自課窗戶洞虛白心田無雜涴爐香裊餘烟棾唱松風和天寒補未完短日簷前過耕樂軒耕田良苦辛所樂果何事百年安吾生食力非役志衡門無軒車榆柳䕃閒地遙遙草廬人回首空長喟分題道林寶塔送貫道先生歸湖南鍾山禁城東浮圖出林麓層級凌紫烟虛簷交翠木異人昔垂化千載有遺躅夕夢鏗清鐘晨筵散華燭一諧湖南英憑髙曠遊目江山環帝京形勝天下獨安知復遄邁悵焉此遐矚寒日下西南輕帆駕孤鵠題三笑圖過橋本無心三笑亦偶爾當時肯垂名好事傳畫史巍巍匡廬峰湜湜虎溪水援筆寫清髙幽興殊未已分題龍宫寶石送陳庭學之官成都成都山水區龍宫遺寶石苔蘚滋古紋波濤含潤色驪珠化海榴神變安可測想當聽經時雲寒夜堂寂蜀中天下險兵戈屢充斥城郭雖已非此石尚如昔京華歲將闌萬里送行客時清衛府間搜竒撫陳迹平生獨往願蹉蛇頭半白悵望西南天空慙逺飛翼成都唐髙僧智浩常誦法華經所居近龍祠龍女時來聽經一夕遺一明珠不受珠化為石似石榴以水洗之有四字曰龍宫寶石至今存焉出峽圖瞿塘水如馬五月不可下兩舟何處來披圖一驚詫前行稍趨平勢若閒暇者後來方履險衆篙不停把巖回古木披峽束哀湍㵼嗟爾駕舟人安危在撡舍松石室青青山上松鑿鑿山下石移來近禪居窗戶生秀色室中老比丘怡然坐終日轉境不在遺觀心了無得疏雨灑嶄巖微風動蕭瑟所適不自知何有喧與寂日彰法師得㫖還山王生作泉石閒齊圖豫題詩其上以為贈行奉詔還故山江船復東下獨帆如飛鴻秋日照平野王侯贈新圖山水儼幽雅石崖天際髙茅屋長松下清香散佛龕妙觀了空假白雲席上生碧溜階前㵼神清境自閒所適無取捨佳趣政在兹健筆老能寫乃知遺世情獨有還山者安得添我身閒齊共瀟灑張侍郎栖鳯山房詩番禺饒名山鳳臺獨竒峭丹崖耀白日連林際飛鳥葛嶺勢相向羅浮狀如抱昔年鳳來栖髙梧成翠葆山房結構新門徑烟花繞幽人不出户典墳肆探討卷簾蘭氣清倚檻泉聲小騎羊五仙侣時時來論道一從乘傳車十年迹如掃出處成兩途榮華異枯槁披圖思茫然夢中歸路杳炎海靜無波秋巖桂花老萱堂詩堂後萱花明堂中白髮清堂下弟與兄上堂稱壽觥白髮常在眼諼花願長榮人生有至樂此堂日日升雨花臺送客梁朝雨花臺近在城南陌不見講經人空林淡秋色登髙俯大江目送千里客白鳥下滄波孤帆逺山碧題竹石圖竹石吾所愛眼中無此清如在異鄉客忽逢親弟兄竒質含古潤虛心抱幽貞渾忘是圖畫疑有風雲生焦山寺鑑師臨江軒一峰如巨石屹立江水中寶剎蔚崇構勢與山爭雄若人於此住超然塵外蹤開軒當水面下瞰馮夷宫魚龍近几席波濤蕩襟胸有時天宇淨倒影清若空燕坐觀衆有起滅殊無窮一念寂不動嗒焉心境融焦先邈千載遺丹射林紅浩歌倚闌夕明月生海東送大彰徐博士還錢塘以客路青山外五字為韻賦詩五首白髮出都城青山引歸策凉風江上秋驚濤海門夕老驥厭長途倦鳥思斂翮芙蓉白露零惆悵逺行客出郭醒客心馳車復東路得官遂清貧還家慰遲莫諸生日討論詩書自成趣閒尋南塢僧長吟倚巖樹少壯若傲世閒居謝榮名徵書劇羽檄白首試大廷人材樂教育泮水清風生應憐舊山桂歲暮有餘青流水出山外固不如在山孤雲度天際眇眇何時還伊余巖下客于今乃塵寰逢君一長嘯人生有誰閒纍懷湖寺逢何時江城㑹况當秋夜凉明月坐相對來日非今日握手復一慨相别無逺行出門即天外汧陽雪中朝寒擁衾坐隔屋聞書聲起掃車上雪千山雲霧冥春泥沒深轍前路不可行雖無督迫令惻惻如有程邑中賢令佐尤篤鄉里情暖屋延笑語照眼雙璧清慰此逆旅懷忘却留滯并行客何所願長歌望天晴孤凰引雛行題何氏母子貞孝卷丹山有孤凰獨引羣鳳兒朝曛待哺急風雨護巢危鳳兒日長大感念凰母慈母亦弗忍舍願兒長相隨晨曦出暘谷文采方葳蕤和鳴當盛世九土春熙熙上林有竹實亦有梧桐枝嗟爾母與兒銜圖一來儀題畫青山半天髙白雲如海濤溪流轉谷口茅廬闞林坳山人何處去月明猿夜號寄題雲門松風閣何處聽松風金雞山下閣夜凉月照窗冷然滿幽壑如卧江上樓夢覺海濤作疑行洞庭野兩耳鈞天樂溪翁聞性空妙觸了無著野馬從鼓漂太虛自寥廓緬懷師友情撫卷翻不樂人亡閣亦非題詩付冥漠松下居偶作我此松下居即事良可恱閉戶留白雲開軒放明月松響風急來泉流雨初歇時有西齊人相親默無說送僧遊廬山廬山天下竒良游遂平素江帆渺何之連峰散晴霧雲端五老人粲然風骨露青衣或來迎木客時相遇夜坐松底石天燈知幾處忽聞巖際鐘忘却東林路送瑄上人揚舲下大江江寒欲飛雪髙帆天際遙獨鴈雲邉沒烟波渺何之倐忽成楚越遂令白首人年華感消歇不羈行贈吳客倜儻不偶世落魄江海游雖來京國久不謁公與侯仙人五城髙彩雲十二樓天街看明月一身風露秋翩然下揚子棹歌發吳謳太湖三萬頃鳬鴈中沉浮且作拍浪兒赤腳坐船頭笑指闔閭墓千古成荒丘樂樵明時忘世士所樂在樵蘇自無鐘鼎念此心常宴如清晨礪斧出孤雲引行裾薄暮負薪入明月照庭除新篘已在甕鄰叟行可呼大瓢喜滿眼醉後歌嗚嗚青天若覆盂白日無根株不見北邙道貴賤同丘墟夜坐雜言次韻老來百念忘外緣何用屛乘月坐更深和雲卧峰頂青燈靜照壁白髮垂到領尚懷分芋人寒巖甘息影羣生不同趣所本非異原有耳醉曼曲誰能聽𤣥言粲粲白月珠可照長夜昏不逢希世客吾衰尚何論明月出東嶺照我窗牖間羣動夜方息白雲亦孤還緬思支道林沃州曽買山逺公竟不出逸駕安可攀坐致不請友翩然逺來集幻境非久留白日西馳急此宵曾幾何晨露下階濕紅顔不可駐瑶草無人拾再用韻二首孤燈坐二更茶具獨未屏春寒逼清明紬帽猶在頂大音本無聞含笑秖自領月上猿亦來窗前㺯林影羣情尚怵迫烈火方燎原縱能齊得喪不如無一言有耳但如聵有眼從自昏至道念縣曠瑣瑣安足論隱耕為陳參政作孔明南陽廬伊尹有莘野遭時展經綸豈是長隱者陳君蒲田居耒耜常自把致力良已勤所入未為寡矧今副方伯承宣及秦夏厚祿代躬耕峩冠稱儒雅生逢堯舜君恥在稷契下他日請歸田此志方可寫偶地居偶地即吾廬絶勝樹下宿不在千萬間安居心自足古人三十年辛勤乃有屋我無一日勞何必較遲速燕坐白日間青山常在目明月到床前更深代明燭几有寒山詩興來時一讀十日不出門滿階春草緑北萱堂萱草可忘憂樹之北堂後此堂何為設白頭有慈母暑月萱始花凉風吹户牖母顔和且恱上堂奉尊酒歲歲見萱花年年獻親壽兒孫滿眼前甘㫖亦具有昔當艱虞時東西屢搔首幸今際承平日不離左右我間南陔篇古人相戒守願入北堂詩絃歌同永久雲巢雪洞雲巢萬物表雪洞鴻濛先結搆自無始安居可長年雪色共清素雲氣同周旋六窗既虛寂神宇何廓然白鶴繞巢外長鳴月當天仙人從空來散花滿璚筵有時乘飈輪浩蕩游八埏俯視滄溟水倐忽成桑田下士夢未覺如醉方酣眠茫茫百年內寧知此中𤣥蘿壁山房為趣上人作石壁掛青蘿禪房在其下松枝裁作扉茅覆不用瓦若人百念忘襟懷自瀟灑行看塢雲生坐聽巖泉㵼怡然朝復曛在已無取捨於中亦不存何有空與假一從入山來見山不見野寒拾千載人誰是同流者題畫城居不見山披圖得佳趣茆茨隱石根槎橋入溪路欹崖勢若飛半嶺開晴霧將非夢境中或是曽游處如登華頂峰稍識蔓菁渡振衣寧後期松華滿春樹樵隱為江子瑜作日出上山去日入負薪歸明月照茅屋凉風吹薜衣濁醪在瓦缶大白兀自持嚶嚶春鳥鳴載歌伐木詩不羡買臣貴不學犢牧悲軒車自髙駕野雉從朝飛平生一丘壑此志良弗違田竇門易軌不知誰是非夜宿陜州烈風振林木中夜聞號呼重衾冷於水照壁青燈孤念此苦寒月單車走長途明當度關去歲晏將何如望崑崙積雪覆層巔冬夏常一色羣峰讓獨雄神君所棲宅傳聞嶰谷篁造律諧金石草木尚不生竹産疑非的漢使窮河源要領殊未得遂令西戎子千古笑中國老客此經過望之長太息立馬北風寒回首孤雲白贈安古心還山中子來能幾日遽有還山想長笑輕别離一䇿晨獨往舊房清澗阿夜雨新泉響門前嘉樹林隂隂夏條長即此人事絶遂爾長偃仰得句林花開彈琴山月上蕭散世念踈淡泊道心朗白駒空谷中誰能復羈鞅何彼勢利人勞生在天壤待月軒開軒坐深更待月出東嶺須㬰海上來四壁光炯炯托茲聊自娛觀心庶遺境獨羡寒山人無物堪比並全室外集卷三
