body:
  text: 全室外集卷五明釋宗泐撰五言律詩應制賦聽松石榻坐來久松濤萬壑聲輕揚同梵唄細奏學龍笙不獨回禪寂猶能悅聖情莫歸還在耳魂夢亦須清奉題岷峩保障圖二十韻舊説岷峩地今觀保障圖煙雲開劍閣花桞滿城都宫殿規模壯山川氣象殊軍州餘五十德教越邊隅列戟千貔虎連檣萬舳艫涼颸消瘴癘甘雨起焦枯大矣惟王國欽哉自聖謨星辰天北拱江漢日東趨宗室推賢哲皇綱在翊扶逸才超子建古迹陋魚鳬美産隨方有名公何代無韋張曽節使揚馬捴文儒錦綺民財阜鹽麻國用須沈黎通詔𤏡巫峽下荆吳雪嶺西蕃近青霄太白孤來朝椎髻獠入貢越裳徒關已無當者天何設險乎詩篇歌樂土筆力愧潛夫撫卷生新想聞風欲遠驅永言磐石固矯首望雲衢夢清遠兄殘睡夜將晨分明見故人劇知情是妄翻説夢成真日月容顔老池臺笑語新三年消息斷江漢尚風塵送瀾法師歸雲門故山從此去何日更相逢獨倚千峰閣間聽六寺鐘石牀流水繞蘿徑落花封會有東歸興來尋雲外蹤暑病作暑病只思卧坐來頭目昏愛涼頻换簟畏日不開門穴鼠窺人出林蟬入耳喧同袍來問疾相對默無言挽戴隱居仲夏初相别何知異死生艱難十日會感激百年情岩穴無遺佚交遊失老成忍將芻一束脈脈對銘旌溪漲曉起聞溪漲披衣立小軒混茫初學海澒洞欲包原光撼山根動聲吹地軸翻羣童不曉事喧譟傍沙痕陳檢校見過何來鳯池客著屐到岩阿溪雨曉初歇山花開正多道逢方外合詩愛靜中哦寂寞禪房晚疏鐘出薜蘿重答夏本心有約何曽至無期却自來暖憐沙上日清愛竹邊梅山鳥當琴几溪雲對茗杯桓公遺廟近乘興一追陪洞山泉為諧舜咨賦此水何年有瀟瀟日夜聲不教人外見偏向洞中鳴客思初無睡禪心自不驚休論為世用且作在山清櫟山西齋雨中作疏雨過高峰幽齋對碧松出山雲似馬落澗水如龍句向靜中得身於僻處慵小童林下至報有虎行蹤寄汪隱居茅屋湧溪阿天寒補薜蘿白雲當靣起流水繞簷過藥老披榛斸詩成倚樹哦因逢鄰寺客為問近如何故涇縣徐典史挽歌白髮神仙吏黃塵八十齡竟同華表鶴俄失老人星甕盡牀頭酒埃生桉上經今朝來哭處墓草未全青送夏景瞻獨立有作溪上送歸船新晴水一川迅流端似馬解纜即如仙野迥村煙直山高夕照偏此時獨立意都屬數聲蟬一室一室晚獨坐閉門心境空偶將真意會却與古人同經架侵忩雨茶煙趁竹風興來戛銅碗未必便為通間行林下可逍遙間行意頗超幽花不礙路偃木自成橋度嶺何須屐㪺泉豈用瓢無媒甘老去愛爾草蕭蕭送春忽忽雨中去獨吟相送時忘情從别易惜老願歸遲花在如憐客鵑啼欲恨誰明年看到處知爾更無私喜王子謙見過積雨林居僻俄驚使節臨不因今日話爭見古人心疏磬青蘿外流鶯碧樹隂松門間不掩此後更誰尋休鑷白休鑷髭髯白從教次第生和風消不得妙藥染難成間竹梅初破黏松雪半晴今朝間把鏡稍共鬢毛明西閣為修師作眷兹山閣小獨住一間僧座冷浮青靄簷虛挂碧藤禽殘瓦鉢水鼠餂夜忩燈愛爾不能懶時時為一登與徐伯亷再往南陵又向南陵去復攜良友同人煙千嶂裏客路百花中雉雊初晴日鶯啼滿樹風漸知精舍近清磬出林東雙清士詩廬陵張君書紳歐陽君子剛宦逰四方同為浙省掾以清自勵大參蔡公嘉其操為署所寓邸曰雙清館而書紳先以滿告去子剛誠有不忍舍者豫為雙清士詩以贈之有美雙清客齊名浙省郎兩鳬相上下聨璧有輝光粉署朝同硯郵亭夜對床涼風鳯池上羽翮惜分翔題畫紈素不盈尺寫成千嶂圖松杉開閬苑樓觀湧玄都瑶草如堪拾黃猿不受呼羣仙相次坐許共一僧無送玄極歸仙居三學寺兼寄固壞菴昨夜共青燈今朝下碧層衣沾吳野雪飰煮越溪氷鄉寺居三學宗門尚一乘故人頭向白送爾思彌增作詩贈智一真作詩期必化化是不凡材龍起天雲合鵬飛海水開具區春泱漭泰華曉崔嵬試問同禪侣平生悟幾回題漁樵圖兩客此相遇百年天與間泊舟臨碧岸吹笛對青山怪樹依巖老幽花笑日殷畫圖誰不羡塵土自摧顔題彌仲綸淡泊齋禪齋名淡泊自可寄間身席上塵都積門前草自春寒衣縫野槲曉飯煮江蓴不動區中念端為世外人贈立恆中海外趂商船江東住幾年華音雖已習鄉信若為傳一鉢隨緣飯諸峯到處禪涼秋明月夜夢度石橋煙登多景樓水際一峯出飛樓倚泬寥煙雲連北土風物見南朝山勢臨淮盡江聲入海消偶來間眺客慿檻興偏饒送潘允英還鄉秋風江上起江水日增波旅服迎寒薄鄉心到夜多吳檣隨北鴈海舶聽南歌想見伸嘉慶雙親髮盡皤送王叔潤平涼來又去官滿復之官塞晚黃雲合邊秋白草寒有儲諸將喜無訟遠人安萬里關山月吟詩獨自看竇德遠西齋讀易詩西齋讀易處心與靜相宜對燭雨涼夜卷簾天霽時妙觀寧有象至玩本無辭一悟窮通理陶然坐自怡登相國寺樓冬日大梁城郊原四望平雲開太行碧霜落蔡河清欲問征西路兼懷弔古情夷門名尚在無處覔侯嬴過虎牢關入關登峻坂出谷見黃河客路車行窄人家穴處多洛陽當勝槩嵩嶽近嵯峩千古興亡恨臨風一浩歌長安雪中嵗暮長安道天寒積雪深凄涼逰子意欵曲故人心未遂終南隱徒憐灞上吟明朝又西去秦樹晚沈沈題馬文德終南别業别業終南下屯居異輞川豆生新雨後禾熟早秋天明月池邊酌涼風樹下眠龔黃成底事青史舊空傳發扶風曉發扶風縣雲低欲雪時長河王莽寺獨樹馬超祠營窟炊煙早牛車度坂遲非熊無復夢渭水自逶迤雪嶺華戎分壤處雪嶺白嵳峩萬古消不盡三秋積又多寒光欺夏日素彩爍天河自笑經過客相看鬢易皤屋舟吳人舟似屋今子屋為舟四靣水都繞百年身若浮下臨知有地中坐恐隨流夢裏天無際微茫發棹謳送鄭公志奉兄骨還鄉昔出為元方官登吏部郎挈家才食祿裹骨竟還鄉歲暮氷霜白山空草木黃雲邊孤鴈影南去海天長天華説法造玄微天華白晝飛從空方糝糝似雪又霏霏滿座都凝目何人更著衣梁朝臺咫尺今古共光輝次韻詠雪灑忩疑雨急投隙信風斜換竹千林色添梅幾樹花戲堆朝作獸滿掬夜煎茶乘興山隂客能過靜者家槎峯雜詠芝巖高岩何壯哉萬古碧崔嵬不是五丁鑿應同一氣開靈芝隨地有怪木是誰栽待結茅亭後時時引客來南澗攜友過南澗槎橋類斷虹鳥啼青嶂外麋卧緑隂中僧笠迎秋雨樵歌落晚風謝公雙屐健獨入杏林東杏塢山杏何人種東風滿塢花如聞魯壇曲或是董仙家谷口千林密岩前數樹斜明春移屋去住近赤城霞白蓮沼不作虎溪念開池種白蓮但知今日事寧論昔時賢疊石高為岸疏渠細引泉看花初日際玉立淨娟娟對池亭一亭如甕大自可著間身白首幾時客青山有限人到秋蓮實老得雨芡花新莫謂無心事朝朝送日輪三老亭為愛岩栖好結亭於此間一身同二老白首得青山破靜聞猿斷忘歸待鶴還采芝人去後日莫碧雲間深居山崦入重重誅茅第幾峯四簷青樹合一徑白雲封夜冷齊腰雪春隂破額松自來深處住樵客不相逢送宗法師住慈感坐惜故人别年華老漸催冬深不見雪春近未逢梅船向苕溪去水從天目來今宗亦寥落幾處講筵開題畫良工奪化工隨物寫形容可怪一尺素忽生千萬峰塢雲白冉冉岩樹碧重重忘却是圖畫出門携短笻送張士衡之陜西故舊今誰在江花四十春獨慚青眼客相送白頭人紗帽新辭闕單車遠入秦廣文樗散意好在酒杯頻處夢處世皆如夢惟吾識趣間乾坤同逆旅日月自循環覔句多臨水支頥或看山莊周與蝴蝶猶在是非間石溪漁隱乘間埀釣客多在石溪中斷港孤蓬雪長堤一笛風滄浪歌濯足渭水兆非熊好為明時出休誇隱德隆過鳯翔驅車過鳯翔馹路入汧陽地接戎羌遠山連蜀隴長平川將盡處重谷轉荒涼明日關山道登高望帝鄉次韻送徐伯廉歸南陵把酒城南道離懷去住同鳥啼紅樹裏人出翠微中山雨添秋色溪雲度晚風倚樓相憶處明月各西東江風山月堂詩為文起周作風月堂清絶江山夜寂寥寒光吟處白靈籟靜中消脈脈照林薄翛翛送海潮禪心與詩思何用不超遙入孤澗有作谷裏何人住山腰有徑通老猿時挂樹好鳥自吟風古澗寒泉碧連山夕燒紅隱居慚未遂明日片帆東朝來朝來暑氣清疏雨過簷楹徑竹欹斜處山禽一兩聲間情聊自適幽事與誰評几上玲瓏石青蒲細細生大寧寺喜雨何處新聞雨深山古寺中曉聲兼蟋蟀秋意在梧桐已覺人情喜深知嵗事豐山翁病全減相對笑顔同過后山為惜山程近行穿石徑微藤稍斜刺眼草子細粘衣廢宅人何在荒林鳥不飛舊逰還歷歷撫事覺今非幽居長夏山中客幽居愛靜便花埀初著雨樹白半籠煙斬竹修瓜架刳杉引石泉有人知此趣為爾一欣然兀坐清曉淡無為空齋兀坐時百年惟有懶萬事不求知松雨晴還滴茶煙起更埀何人共怡悅隨意獨支頥雨中作山雨暗連村遊人不到門幽居斯道在黃卷此心存世豈齊常變吾方一靜喧竹禽如解意相對語前軒雪夜沈沈寒夜永歷歷禁鐘餘空館三更雪殘燈一卷書禪扉原寂寞客舍獨何如不是忘情者孤懷詎可舒送楊子震之夔州府知府太守之官去遙遙白帝城江流諸葛陳山木杜鵑聲自古論形勢于今息戰爭文翁能化蜀端不負皇情題送别圖送客送别長干道仍題送别圖平林帶遠谷白鳥下青蕪天際帆千幅沙頭酒一壺勞勞亭畔桞還似渭城無次韻東軒見訪老結淮山屋重圍橡樹林鹿行巖徑窄虎飲澗泉深風雨人間事氷霜世外心夜來明月上擁毳一長吟亭南書隱為貢友達作敬亭南野濶家世舊雲林三畝水邊宅半生燈下心間依渭叟釣醉與楚狂吟門外無車馬年年草自深次韻贈太平縣姚主簿龍虎新開國鴛鸞盡列廷辟書從帥閫得縣次郎星材擬王珣筆文超崔瑗銘暫時栖枳棘從此奮青冥舊説酬三語猶聞究一經陋邦霑美化疲俗尚輕刑秋水清虛郭春山紫翠屏冥懷勞簿籍散步出郊坰薄暮投禪屋將詩自憲庭來窺麋鹿性喜識鳯凰翎破榻霜苔冷孤燈夜雨青吾生同稿木身世即浮萍老去思歸浙年來厭在涇逢君俱越客矯首望東溟排律詩三十韻奉餞杭州王太守任滿朝京吳甸初賔服皇威暢海壖錢塘稱劇郡太守選時賢保障東南重絲綸惠化宣疲民思白日披霧得青天示儉豪奢革祛煩疾病痊淳風還大朴舊俗付新湔清淨尹東海寬明黃潁川論才當第一奏課合居先漢室符中剖黃堂席更專兩轓朱烜赫五馬爛聮翩方伯真榮矣斯人亦幸焉始終如一日安集已三年市有新成屋郊無久穢田湖山青入畫桑柘緑如煙昔在新安治恭聞異績駢大州難接武列郡少隨肩棠憩隂初合瓜期代倐然依劉心耿耿借冦思綿綿白叟驚相顧黃童也自憐卧當侯霸轍挽擁鄧攸船趨陛雲霄逼承恩雨露偏赤墀迎氣淑紫服照春妍行獻嘉禾頌歸歌湛露篇賜書褒美效增秩比超遷當路瞻鵬舉臨風想斾還夢回江上笛愁絶雨中鵑謬忝餘波及都將外物捐茆茨間日月鐘鼓樂林泉支遁期元度韓公識大顛試磨蒼蘚石遺愛儘堪鐫送宋學士歸金華當代文章伯朝廷制作新儲宫賢少傅開國老詞臣際遇超今古優容異等倫莫歸蓮作炬前席錦為茵班固材尤贍揚雄語大醇一麟生治世長劍倚秋旻仲子金閨彥佳孫玉樹春尋常勞聖眷七十解朝紳戀闕行猶緩還家樂更真都門開祖帳里曲候征輪未覺鄉音改其如此志伸淨名應杜口善慧必觀身婺女星辰逼蘿山雨露均挑燈書細字置酒洽比鄰白石求真侣青松結社人無心誠契理有道足怡神自愧非支遁空知讓許詢三生情是夢十載法為親别去投青簡秋來覲紫宸涼風吹彩鷁攜手大江濵法華山房為敷竺曇賦山房白日靜政對五蓮峯猿坐沼邊石鶴巢簷外松間門無客到深徑有雲封座冷千林雨香殘半夜鐘道情甘淡泊身計得從容莫戀一枝穩鳥飛無定蹤隴下居佛隴金銀地新塋祖塔前誰知天地祕遠付子孫賢月冷石橋磬雲開華頂蓮好留行道影千古照林泉山水圖二首何處山如此人間畫獨工數峯華頂合一徑石橋通野艇依桃澗仙臺近柏宫曇猷不出定雲樹晝溟濛絶境天成妙良工意匠能山腰上方寺樹杪獨行僧澗滿泉流迸雲虛谷氣蒸衡廬端可挹好上最高層晚晴出縣渡賞溪出寺雨初晴溪回夕照明桞邊雙鳥白松際一蟬清小縣逢迎數孤舟去住輕因看下灘水笑問幾時平落葉一片復一片西風與北風但看階下滿不覺樹頭空綴服猶堪用題詩自不工山童朝更掃間委古牆東全室外集卷五
