  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0072_WYG_010-1a, image: WYG1234/WYG1234-0853a.png}
body:
  text: 全室外集續編明釋宗泐撰題顧仲瑛雅集圖良時不再逢嘉會難復得斯人亦云亡玉山空黛色有生能幾何忽如駒過隙昨日歌舞地回首成陳迹臨淮秋雨朝覽圖增太息黃鵠招不來蕭條望八極送一初講經還京師奉詔住天禧寺鳯城夜來雨南風生緑槐良友捨我去老懷誰與開晨雞戒蓐食使者行相催空餘淮甸月長照講經臺中都寡名緇有此萬人特問法常滿堂白日無虛席去留係重輕山川為改色風雨舊房前蕭條芳草積相知二十年相見輒傾倒平生江海逰如此眼中少白首送歸情何以寫懷抱曉日幽林中和鳴有黃鳥遠山樓為嚴子明作去年曽上遠山樓樓上疏簾不下鈎一點峯巒青髻出半空臺殿采雲浮煙生近郭千村暝水落長淮萬里秋門外紅塵深沒馬何人知有此清幽南閣偶成南閣一躋攀川原指顧間野煙低度水暮雨暗連山去馬黃沙路征帆碧樹灣不知人世裏今古有誰間題張士衡畫竹誰寫琅玕近石傍半叢春雨半秋霜雲門山客豈無意老幹不如新笋長題盧生山居五事耕田前村後村雨歇舍南舍北水生借問南山扣角何如谷口深耕牧牛緑草茸茸滿蹊牛迹遠近都迷煙外數聲桐角溪東吹過溪西灌畦抱甕歸來日暮高槐樹下月明喚取鄰翁對坐一樽濁酒同傾采藥日出長鑱在手獨入千山萬山忽見桃花流水誰知不是人間洗竹雜生千個萬個淨洗三叢兩叢眼底亭亭玉立美人含笑迎風題畫白雲生遠岑明月照空谷松下兩仙翁行歌紫芝曲霜清鏡湖水木落剡溪山寂寞草堂客看雲終日間水仙梅月白羅浮夜波生洛浦春夢中相見處對雪寫風神湘妃出鮫宫玉佩隨風舉不見九疑山愁雲隔遠浦耕雨鳩鳴桑雨深蓑笠耦耕叟短歌三兩聲東風動楊桞龍江送别圖馬仁安寫贈郟志行時志行歷城縣丞仁安郿縣主簿同時之官相送龍灣雨雪寒齊秦千里各之官青山緑水江南意留取新圖别後看送人歸南昌白首相逢又别離好懷開處不多時江頭桞樹春風裏怪底千絲與萬絲山水圖仙閣崖根桂樹叢釣絲溪口荻華風支公吟對千峯晚放鶴歸來月滿空題翠竹芙蓉眼前清麗是秋光翠竹疏疏映拒霜王母燕歸風露冷碧雲影裏淡紅粧寄陳生疊嶂樓前九曲坊曽同墨客坐華堂卿家好事能投轄簾卷春風白晝長渭水離亭圖太白峰前渭水邊桞亭春雨惜離筵江南回首三千里一度披圖一惘然感時不謂承平日居然有亂離感時空自嘆避地欲何之蛇虺江淮塞鯨鯢渤澥危青山雖滿眼無處著茅茨題然本中已山樓此地昔年過慿高興若何市聲歸院少山色入樓多白日下空際片雲生碧阿今朝易為感回首一長歌送術士李光道歸越送客都門道落花逢暮春還持鬼谷術歸隱海東濵流水溪頭屋白雲松下身他年應辟薦來訪赤城人梨園圖千樹花如雪梨園春晝遲霓裳齊起舞鳯管不停吹院落深沈處君王醉醒時玉人憐貌損折取半開枝藥庵卿家藥作庵因病却相諳品數居南北溫涼識苦甘洗當泉脈活晒待日光酣四壁無他物應知老更耽秋興六載江淮厭用兵遺民處處困徭征蕃商舊日多歸漢海漕于今不入京萬壘鼓鼙生夜月幾家砧杵落秋城西風無限思歸客王粲登樓最有情近聞方東軒新造軒成復用前韻賦詩以寄移家淮甸久玉樹已成林江漢放情早文章用意深雅無浮俗態獨有古人心莊舄何為者區區動越吟題畫竹美人湘北岸翠蓋倚中洲斜日雨初歇斷雲橫未收題江山小景長林帶晚照極浦起寒波茅屋遠山外扁舟歸興多題畫茒屋隔榆林孤舟繫桞隂明時無逸客誰在白雲深寄題張天師耆山菴聞説耆峯勝地偏菴居别是一壺天雅宜河上仙翁住穩稱山中宰相眠塢口白雲深似海階前瑶草碧如煙閉門不語坐終日妙入無為合自然上已日西澗獨遊三月三日天氣好西峯獨往成幽尋黃鳥交交桞煙重斑鳩喔喔桑雨深草花已滿古石路澗水亂穿修竹林寄語蘭亭修褉客吾將此地為山隂讀斷江集直上丹山擷鳯紋倒翻滄海取龍筋攜來世上無人識散作青天五色雲重過東菴小菴深住亂峯西古木逢春葉未齊記得去年三月裏松花滿樹杜鵑啼題虞邵菴遺墨閣老仙翁去不還雀巢詩卷落人間璚林臺上秋風冷天藻亭前野草間滕王閣圖滕叔錢緡辱獻陵洪州都督更驕矜至今高閣漳江曲却與文章萬古稱琢鍊堆舊天界寺方丈後一小山也琢鍊堆何竒哉平地湧出青崔嵬喬木一簇翠隂合閧市咫尺無纖埃緇客吟登最高處琢辭鍊意肝膽摧蟬與吟聲兩宛轉鶴隨舞袖相盤回當此時也如耄如倪飢不索飯碗渴不求茗杯倚松坐石無次第踏碎半畝青青苔劃然一得如醉醒涼風颯颯懷抱開天葩筆底動光怪珊瑚出水珠含胎吾聞古來苦吟者貫休齊已名相儕後生崛起會陵轢豈獨二子稱竒才嗚呼豈獨二子稱竒才全室外集續編
