body:
  text: 全室外集巻四明釋宗泐撰七言古詩魯王登泰山奉令㫖作宫漏聲沉天欲曉嚴車整隊東郊道泰嶽巍然境内山暇日登臨散襟抱初聞鼓吹入深谷倐見旌旗出林杪捫蘿不憚路﨑嶇直欲髙躋極飛鳥峻㧞中霄日觀峰閶門白馬明雙瞳下視滄溟一杯水六鰲背負三神宫東封古來天子事石壁千尋刻文字吾王祇欲窮冥搜䬃䬃冷風引飛騎上界羣仙朝玉京空中夜半天雞鳴隂崖鑿開混沌竅石髓飲來毛骨清樂不可極下山去羽葢霓幢擁歸路奥域靈區非世間廻首蒼茫隔烟霧蜀王江漢朝宗圖江之水出岷山漢之水出嶓冡萬古波濤坤軸動荆州東下匯流長江漢朝宗名益重大哉金陵天子都萬方臣子爭奔趨有如百川到溟渤混茫無際涵空虚賢王受命封蜀土忠孝為藩奉君父大峩遥挹北辰髙保障西南天一柱江之永漢之廣蘼蕪緑草年年長誰知𣲖自天潢分天潢近在青冥上潭府四暢亭讀古書彈古琴一亭風月開清襟臨池洗硯冩新句玉壺㫖酒時一斟如此四暢載登載臨美哉修身治國上順君父足以大暢吾王之心梁園詠雪多士如林河間禮樂和樂且躭既不泥乎聲色亦不縱乎田禽此亭燕坐自朝夕亭前花木春隂隂衡山髙湘水深天長地久揚徳音送思上人還霅上𤣥冬雨雪方載隂閉門黄葉和雲深重岡複嶺烏不度豈有逺客來相尋憐君兩屐無新齒足趼荒途五百里捫蘿髙陟麻姑壇斧氷亂渉琴髙水為我巖居十日留夜窻說盡東西州平生故人得消息既有新喜仍新愁我方無以􅇺幽獨子來何遲去何速山川悠悠錫影孤海闊天髙一黄鵠謝君相知未深厚索我詩詞我何有自嗟百挫英氣摧敢以文字誇人口君當盛年冝自强美玉雕琢為珪璋明朝别後母相忘水晶宫裏涇川傍東臯老人歌東臯老人七十餘眼明能讀細字書年來不肯城郭住無事只愛東臯居東臯所居良不俗松竹桑榆翠圍屋前畦後圃花相暎滿眼児孫美如玉老人心中樂閑曠時時倚杖東臯上烏紗側裹酒半酣目送飛雲度青嶂吾知老人與世違東臯幽處無是非吁嗟怵廹何所為世間冨貴多危機雪舟圖為王公擇作小船載雪月明裏一色溪山夜如水巖前哀狖噤無聲沙上眠鷗驚不起引觴擊楫歌調清到門興盡非無情丹青豈必圖千載王氏風流今尚在敬亭雲歌送吳子歸宣城敬亭山中生白雲有時化作五色文從龍下山為雨去欲與世上袪塵氛由來舒巻不可測遥天烱烱無遺迹甘雨未洽塵未消直使時人空嘆息歸來偃蹇敬亭上㸃綴青山千萬狀曽巔髙擁白玉屏半嶺間張素絲障雲兮雲兮爾才未盡施只恐復被蒼龍知乾坤上下相追隨青山欲戀無還期菖蒲歌蒲生山澤間水石長為徒超然塵土外秀色清而腴印公愛之如寂公當軒盆植數十叢雖無仙人鸞鳳狀好事剪拂還相同葉如蚪鬚直不巻根穿石罅連蒼蘚昔聞張生十二節蘇子九花今宛宛眼中清氣端可掬此處焉知有塵俗去年贈我小石盆几上團團青一簇知君定出聊自怡此心豈為物所移色空都忘心境寂寥寥獨坐軒中時水西圖詩水西絶境江左無何君好事冩作圖良工意匠善盤礴三峰湧出青芙蕖古木如龍半天聳白雲翩翩欲飛動桓彞廟前莎草長遺民磯下溪流洶浮圖隠隠林端起知是山腰上方寺髙閣五月秋霜寒山僧坐閱人間世竹邊幽徑花叢叢濯纓亭古連東峰賞溪渡口風浪歇棹舟之子來相從我居山中二十載披圖一見心目駭昔來年少今白頭山色青青長不改何君何君爾好竒澗阿與爾誅茅茨巻簾㣲雨對東郭髙詠謫仙雲錦詞姑蘇䑓歌姑蘇臺上麋鹿游吳江水映西山秋舘娃宫樹逈不見落日荷華今古愁何來豪客増樓㯭醉擁吳姬夜歌舞齊雲易逐浮雲空鬼火三更照寒雨憶昔行贈朱伯賢還㑹稽憶昔相逢白門道君方壯年我差少同鄉異域心最親月夕風晨冩懷抱南臺御史能薦才薦才先取文章好當時結交多俊髦羡君獨得聲名早江城一别三十秋我出匡徒君宦游甲兵滿地音信斷越雲楚水情悠悠今春錢塘忽相見君未全衰我猶健探得囊中著述書松齋曉日開新巻君承明詔入史局我亦奏對延和殿秋深俱放還舊山兼有賜金并賜燕君家雲巢鑑湖曲鯖魚膾肥稉稻熟脫巾露頂松石間如鹿如麋不覊束我歌此曲空復情烈風蕩海鴻㝠㝠世間富貴自可輕且學清狂如賀生阻風行黄蘆獵獵江浩浩洪濤簸天昏復曉一日行舟兩日留上水風多下風少未出門時思逺道在路還思在家好坐看鴻鴈去遥遥却笑人生不如鳥松雲歌境公開軒幽澗湄青松白雲相對宜朝看白雲松上起暮看白雲松下歸松雲無情豈相戀幾度天風吹不散忽如眠鶴喬松巔又似游龍挂松半月明仙侶下瑶臺翠葆素車空外來氷髯玉貌照山澤停驂弭節相徘徊有時林間暫分隔松自青青雲自白若人定起閒怡情倚檻無言山寂寂墨竹行平生不識雲心子墨妙通神有如此眼中何處修竹林湘水邊頭烟雨裏長林蔽􅉻天為隂鷓鴣啼斷江沉沉六月南風晝不熱人家住在叢篁深九疑山帶蒼梧野翩翩帝子雲中下鳳鸞飛舞蚪龍驤羽葆鬖髾翠堪把我昔曽行賞溪曲兩岸波光漾寒緑萬玉森森一徑遥溪口清隂到山麓今朝看圖政自憐畫圖身世俱茫然雲心骨化丹陽土吁嗟墨妙何人傳題張孟兼太常白石山房圖浦江先生張太常白石山下開山房讀書養親不下堂青山自髙溪自長一從攀龍上天闕山中十年春草歇夜飛清夢到山房堂上雙親已華髮孫卿頗擅丹青好為冩新圖􅇺懷抱秋雲半掩草齋寒白鶴不歸松樹老我見新圖憶舊山石梁垂瀑蘿隂閒金華赤城咫尺間何日拂衣從此還墨竹歌房山髙侯愛冩竹一埽生綃數十幅風影翩翩此兩枝湘君遺珮湘江曲兵戈十年翻地軸零落殘紈如斷玉晴軒試掛驚老目素壁清飈拂寒緑魏公文章妙天下世稱善書兼善畫松雪髙齋秋氣清照眼琅玕入模冩一竿秀出何瀟洒美人獨立疎而野九疑雲老楚江寒翠葢臨風為誰把短歌寄魏仲逺夏葢湖吞上虞浦魏君家在湖邊住岸花汀草幾春秋白鳥滄波自朝暮知君愛客仍好竒畫船載酒如渼陂櫂歌中流日將夕璧月湧出青琉璃嗟哉隠居端有道世上無如閒處好王充遺跡尚可尋賀老風流良不少去年聽詔來京國識君臉紅頭半白别懷空與水東流海燕江鴻斷消息今朝聞有東州船尺書欲寄心茫然福源精舎地最偏安得與君湖上相周旋溪山圖歌王侯作畫世無敵下筆直與造化爭神力生綃一幅寫溪山萬疊烟雲開霽色連峰不斷松杉青石崖噴瀑飛寒氷山中逸客茅作亭桃源路入花冥冥何處溪山有如此吳山脚插吳溪水放船半出蘆塘灣收綸撥棹誰家子乃知王侯妙入神縱意所到皆天真右丞糢糊輞川雪北苑爛漫江南春劉卿平生學岐伯長向吳山采名藥天子呼來在玉京橘樹間圍舊時宅我識劉卿恨不早治我沉痾如電掃王侯著意作此圖為我殷勤致懷抱劉卿重畫輕黄金世人那得知其心江上秋風吹客襟髙歌一曲溪山吟寄題彩烟山房天姥峰南彩烟裏梁氏山房屹髙峙幽人讀書居其中萬壑千巖在窻几一從讀書不計春姓名豈肯聞時人去年應聘來京國今年奉符歸養親梁氏新昌稱巨族絡谷籠岡架重屋弟兄如林自師友飽飫詩書作梁肉我聞山房最瀟洒澗水松風入陶寫願學當年支道林買山終老沃洲下崆峒外史歌空同外史清都客吸景餐霞煉精魄誤落塵世八千年囬首仙山雲霧隔自言曾師廣成子為掌外庭稱外史記得軒轅問道時拜跪壇前月如水大布寛衫著雙屐千里遨遊如咫尺曵杖狂歌吳市門賣藥獨走金陵陌金陵陌上相識多水樓月榭隨經過有時醉卧冶城館有時靜坐鍾山阿我識氷顔今十載夜與燒燈論物外五更鼻息如雷鳴忘却天地和身世外史去來無定期出門便不知所之松齋閴寂三日雪待子一笑同掀眉賦一曲亭送趙本初待制致仕歸越鑑湖一曲亭猶在風物千年長不改賀公去後趙公來山水無情若相待當時季真得賜歸黄冠未必全忘機爭似今朝玉堂老還鄉仍著宫錦衣鑑湖水闊吞平野酒船直到亭堦下荷華曉日照尊罍楊柳春風拂簷瓦寄言逸興滄洲客天與斯亭共行樂醉倚䦨干撼不醒夢中細聽鈞天樂度闗隴隴頭流水闗山月月色凄凉水嗚咽今古征人盡斷腸野客經過亦愁絶連林二月氷不開猛虎一吼蒼崖裂鸚鵡能言好寄書心事茫茫向誰說賦梅駙馬清白軒公家大府臨紫陌行馬當門森畫㦸華舘香凝錦繡帷此軒何事名清白軒内琴書清几席軒前池水涵虚碧退朝歸來白日閒燕坐忘言心自適不似金張許史家鬭雞走馬相矜誇美人半醉彈琵琶銀燭夜夜燒彤霞闗西昔有楊夫子清白傳家照青史公今富貴當盛年獨抱遺風有如此山之髙兮益穹窿水之深兮更清泚丈夫勛業在青冥豈獨傳家清白耳題天童萬松圖小白市太白峰二十里松居其中一徑隂隂翠羽葢半空矗矗蒼髯龍太白之峰分九隴壯哉千古之佛宫香雲不動梵唄合樓閣倒影清池空左菴昔年此說法山谷荅響撞鉅鐘只今九重城裏住夢魂夜夜鄞江東錢塘有客曰王䝉為君寫此千萬松座間慘慘起隂霧屋底䬃䬃生清風何來禪子松下度長衫大笠携一笻亦有騶從三四公青林路口衣裳紅我初展巻欲大呌海上湧出髙巃嵸雲端縹緲下玉童有路似與天相通自憐平生不一到吁嗟老矣將焉從還君此圖袖手坐有目只送南飛鴻壽采堂為許克謙賦舞斑衣進春酒載拜稱觴介眉壽許生心即老萊心老萊不先生不後進春酒舞斑衣願親髙年過期頤堂後萱花照華髮堦前亦有蘭與芝吳山可融吳水結孝子娯親心不歇此堂冝與齊門髙壽采之名如日月古村居古村民古村居古村有田復有廬屋後桑麻四五區屋前榆柳八九株老婦辟纑兒讀書青燈夜照三更初牛角帶經耕且鋤年年歲歲輸官租聖人治世如唐虞飽來擊壤歌康衢烏紗作巾白布襦東隣西舎相招呼醉歸兀兀杖自扶古村民古村居題閻立本畫張洪崖像徃年看畫封禺山丹青為我囬朱顔今朝看畫江寧郭頭白眼昏不如昨此圖出自何人手唐相閻公名不朽人間古畫兵火空此圖必為神所守洪崖先生學仙士小隠林泉大城市一下蓬萊經幾塵弱水㣲茫三萬里神仙道術吾不知洪崖人物何瑰竒天寒掩巻松下坐白日冉冉西南馳聽泉軒為藏無盡作若人有耳唯聽泉泉聲入耳長涓涓穿林出澗度妙曲萬古不斷氷絲弦此聲不來耳不徃中自寂然遺外響青燈照壁夜沉沉獨倚軒窻月東上代賦愛蓮歌我愛蓮花生淨域七寶池中開四色其花朶朶大如輪來者於斯孕靈質此花不與凡花同晝夜開合吹香風八功徳水恒充溢碧葉旎旎花藂藂我有愛蓮癖夢寐思見之朝思只在蓮花國莫思不離蓮花池我心但欲與蓮並不染塵埃自清淨蓮兮蓮兮爾作黄金臺他年浩歌歸去來尚睦軒蔣生作軒名尚睦欲敘彛倫厚風俗一門大小捴怡愉不在華筵奏絲竹誰謂古來斯道敦兄弟之間難具論漢謡尺布一斗粟周公管蔡亦流言蔣生蔣生慎終始行見髙名照青史天邊有客發長歌澤國秋風鴻鴈裏周處士哀詩先生墓木今已拱先生髙名尚飛動新城山接冨春山只有祠堂對丘壠我知姓字三十年江城讀傳心茫然節孝光華照天地青史可書石可鎸口誦法華親壽益掉頭不受吳人辟請看齊雲百尺樓落日西風巻行迹西嶺草堂圖為誓上人作摩雲霄人不復見髙風獨為今所羡西嶺東偏舊草堂七百年來陵谷變有苾蒭誓斯受經草堂彷彿圖丹青靈隠山前天竺後飛來小朶蓮華層草堂住近呼猿洞怪石嵌空樹髙聳三生臺畔秋月凉九曲亭邊春水動真觀慈雲兩寂寞􅆐聲夜向峰頭落誓也溪翁白足徒古人已矣今人作我昔年曽十三四挾書晚出中峰寺一氣走上蓮花層兩脚跳梁若奔兕于今老大空看圖江城鴟坐胡為乎人間草堂何處無只有西嶺如西都清源洞圖為潔上人作泉南佛國天下少滿城香氣栴檀繞纒頭赤脚半蕃商大舶髙檣多海寶清源古洞尤絶竒花酒仙人顔色好蛻骨巖連太碧霄晉代青松三四抱髙攀南斗不滿尋下視滄溟纔一沼長年鐘磬度寥寥四月笙歌來擾擾青厓不雨飛白泉紫澤未春生碧草鶴鳴洞口月蒼蒼􅆐挂樹枝風裊裊上方精舎秋葉紅山人不歸蘿屋老不須惆悵看畫圖去去長歌海天曉淮之水一首送别淮之水向東流水流只載行人舟舟行如飛水如射一日可到吳江頭何不載此離情去擲向天涯不知處濠梁有客今白頭望斷孤雲海天暮和東軒見寄長相思一首長相思何終極有美人兮淮之側攀援桂枝歌小山盛服峩冠好顔色昔年遺我雙龍刀紫錦作襓縣素壁中夜寒光貫斗牛但恐屋頭飛辟厯朝朝見物不見人欲徃從之脚無力長相思何終極秋鸎歌千林入秋露氣清林中尚有黄鸎聲似與羣蟬爭意氣東林飛過西林鳴向來春風花滿城柳條拂地如長纓綿綿蠻蠻斷復續千人萬人側耳聽髙樓半醉客閣􅊦停吹笙白馬貴公子挾彈不敢驚此時胡為不喜聽奈何節序移人情只合深藏緘爾口亦有妬爾金衣明反舌無聲良已久伯勞布榖俱潜形秋鸎秋鸎爾能翩然入幽谷老翁歌詩送爾便覺心和平全室外集巻四
