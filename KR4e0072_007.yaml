body:
  text: 全室外集卷七明釋宗泐撰七言絶句次韻錢塘懷古愛梅處士住孤岑吟對花前雪正深不是蘇卿識佳句文章辜負一生心山川形勝說錢塘海接江流入混茫百五十年成底事一丘衰草委秋陽暑夜此夜炎蒸不可當開門高樹月蒼蒼天河只在南樓上不借人間一滴涼春雪眼看平白失前坡三日青松奈老何昨夜東風消不盡古牆隂處曉猶多秋日錢塘雜興宋朝宫殿元朝寺廢址秋風見黍離百歲老人知故事殷勤為說世皇時處士梅花千樹盡蘇公楊桞一株無向來畫舫今何處落日西風野水湖風篁嶺上看龍井百尺寒泉徹底清二老風流今不見一聲山鳥夕陽明訪胡守中不遇入郭尋君不見君柴門閒對一溪雲空山積雪無行路何處今朝友鹿羣送人歸南昌紅顔緑髮映春袍三十年前白下橋亂後重逢天竺寺相看如夢說前朝故人多在大江西欲寄封書懶不題昨夜東風吹夢斷曉來無賴是鶯啼道中青石懸蘿花羃幕緑田分澗水泠泠人家深住黃猿塢漁網高張白鷺汀吳淞江逢清明吳淞江上看春雨客路扁舟三月行兩岸人家插楊桞不知今日是清明漁樵圖析薪岸口晚風和罷釣灣頭月滿簔相對無言成一笑黃塵回首是非多宣城見吳溥泉江海山林兩故人敝貂殘衲總清貧今朝疊嶂樓前過不是五雲坊口春秋塘小景西風昨夜到南塘楊桞蒹葭色轉蒼飛鳥獨來荷柄立不教涼露滿蓮房秋光淡淡水盈盈曽在耶溪緩棹行日莫采蓮人散後桞隂風度一蟬清畫梅今人寫花不寫實古人詠實不詠花晉代清談多少客羞將勛業向人誇對鞠病裏看花更惜花誰分秋色到禪家一年一度催人老相對無言日又斜步虛詞贈湯煉師風送仙香度玉墀朝天歸路月明時忽逢子晉雲中下借得龍笙鶴背吹微宗雪江獨棹圖艮嶽秋深百卉腓沙塵吹滿衮龍衣凄涼五國城邊路得似寒江獨棹歸度潼關潼關西去入秦京今古人多此路行誰料不緣名利客黃塵撲靣聽車聲别隴頭帝遣山人遠入戎半年情緒客程中隴頭流水今朝别人自西行水自東題蘭溪寺曽栽數十叢紫莖緑葉領春風年來蕭艾過三尺白首看圖似夢中題畫閒門寂寂掩芳春坐看梨花帶雨新鳥自白頭渾不覺可堪啼向白頭人偶作竹外茅齊橡下亭半池荷葉半池菱匡牀曲几坐終日萬叠青山一老僧山水圖緑水青山茂苑西荷花開滿越來溪漁郎蕩槳灣頭去五月深林謝豹啼送劉道士葬師欲成仙道古來難曽向先師學內丹不省稚川尸解去人間猶自葬空棺寄東軒黃鞠初開白露零淮河水落遠山青一聲鴈度秋雲冷吟到黃昏月滿庭次韻題宋孝宗朝馬和之所畫三篇詩圖此圖乃王風揚之水篇也馬卿獨念宋中微圖寫詩篇墨采輝戍甫戍申都不及西風淮岸鐵為衣題徽宗山鵲圖落日黃塵五國城中原回首幾含情已無過鴈傳家信獨有松枝喜鵲鳴題小景數箇幽篁著雨低兩株高樹倚雲齊錢塘惟有空山在莫是閒情寫㑹稽觀吳子行别仇山村詩作絶句弔之子行詩云劉伶一鍤事徒然蝴蝶飛來别有天欲語太𤣥何處問西泠西畔斷橋邊吹簫人去竹房空海內猶憐學術工最是西泠橋畔路淡烟疏桞夕陽中題天台歸老圖白頭天外未歸人江上看圖愧此身閒却溪頭半間屋桃花流水幾經春山水圖危峯削玉出雲端仙館霜清古木寒記得匡廬秋雨後彭郎湖口倚篷看全室外集卷七
