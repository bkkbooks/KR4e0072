body:
  text: 全室外集别集類五明提要臣等謹案全室外集九卷續集一卷明僧宗泐撰宗泐字季潭臨安人洪武初舉髙行沙門命往天界寺尋往西域求遺經還授左善世太祖欲授以官固辭太祖為撰免官說其後胡惟庸謀逆詞連宗泐特原之是編題曰外集蓋釋氏以佛經為內學故以詩文為外猶宋釋道璨栁塘外集例也首二卷為應制詩及樂府供佛讃佛諸曲三卷至八卷為古近體詩九卷為疏及題跋續集詩文合編而詩文之間闕四頁其原數遂不可考今所存者凡詩三十六首題跋十五篇千頃堂書目作全室外集十卷蓋合此一卷言之耳宗泐雖託跡緇流而篤好儒術故其詩風骨髙騫可抗行於作者之間徐一䕫作是集序稱其如霜晨老鶴聲聞九臯清廟朱絃曲終三歎倣佛近之皎然齊已固未易言要不在契嵩惠洪下與句曲外史張羽均元明之際方外之秀山者也千頃堂書目載宗泐尚有西游集一卷蓋奉使求經時道路往還所作見聞既異其記載必有可觀今未見其本存佚殆不可知矣徐禎卿翦勝野聞謂宗泐奉使西域未至其地塗遇神僧幻化而歸者蓋未知宗泐有此集故造是齊東之語與所謂宗泐蓄髮還俗同一謬妄也乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀全室外集原序昔者文物之盛士有髙世之志託迹桑門者既有得於其宗而亦以操觚染翰為事以與海內作者齊驅並駕使其教益大以顯有若天台季潭泐公者焉初公負聰明特達之資既釋士服翺翔大方擇所依歸之地時廣智禪師欣公學貫儒墨肆筆於文事卓然成一家言施之著作之廷而無愧天厯至順間光膺帝眷說法金陵官寺緇素向往得其片言隻字以為祕寶馳騁出入以應其請如羣飲于河各滿所欲聲譽赫然泐公既自得師當是之時金陵亦東南都㑹內而臺閣名流外而山林遺老至其地者莫不折節而與廣智交泐公參請之餘又得博其聞見凡六籍之所存百氏之所稡名家巨集之録日務記覽涵揉停蓄而後吐出其胸中之竒譬之築九仞之臺其基既厚何患其不崇且大也故公學甚辨博才甚瓌偉識甚超邁而皆發於聲詩其詩不淪於空寂推敘功德則發揚蹈厲可以薦郊廟褒贊節義則感慨激烈可以厲風俗至於緣情指事在江湖則其言蕭散悠逺適行住坐卧之情在山林則其言幽敻簡淡得風泉雲月之趣在殊方異域則其言慨而不激直而不肆而極山川之險易風俗之媺惡其詩衆體畢具一句一字滌去凡情俗韻一趣乎雅有一唱三歎之意焉故其大篇短章之出四方萬里爭相傳誦震耀耳目皆曰泐公猶廣智也余與公同里閈及壯而游又託方外之好公軀幹魁碩音吐洪暢其與人交也意度豁如望之者知為法門偉器初出世李白題詩之寺值天下亂入山益深入林益密以養其髙㑹大明混一肇隆像教之事今京師第一禪林即廣智說法之地桑門上首非有宿德重望為上所知者不以授之公以廣智大弟子繼席據猊座揮麈之日四衆雲㑹莫不榮之而公處之不以為泰佛有遺書在西域中印土有㫖命公往取既銜命而西出沒無人之境往返數萬里五年而還艱難險阻備嘗之矣而公處之不以為戚定力所至出乎世相之表夫豈庸流之所能窺哉若其見諸語言文字則又特其寓者耳公之從子永祚得公詩法之傳既彚稡其所為古樂府歌行五七言近體為若干卷公别號全室因總題曰全室集以集示余意欲得余言以引其首者嗚呼廣智之集虞文靖公序之謂如洞庭之野衆樂並作鏗轟軒昻蛟龍起躍物怪屛走沉冥發興至於名教節義則感激奮厲老於文學者不能過天下以為知言有如余之昏鄙庸陋得而觀之如以賤目而窺羣玉之府但駭其光采之粲爛而莫能枚指其名也惡足以言之哉余不敢咈其從子之意因以區區之見倣佛其槩若論其至則必有能言之士如虞公者為之言也同郡徐一䕫序
