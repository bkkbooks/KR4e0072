  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0072_WYG_006-1a, image: WYG1234/WYG1234-0831a.png}
body:
  text: 全室外集巻六明釋宗泐撰七言律詩囘朝次韻日華初轉萬年枝西武樓前賜坐時獨荷聖情親有問敢言吾道合無為寳爐嫋嫋天香細紫閣沈沈晝漏遲歸路鍾山纔咫尺晚涼松下賦新詩九月晦日高僧同朝賜饌百官朝退萬幾閒供奉雙趨更引班御座近瞻天咫尺方袍連奏殿中間碗浮牛乳玻璃碧甌薦龍團瑪瑙殷奉詔且留京寺住敢期何日定還山進應制獻佛樂章曉進封函紫殿深九重齋沐政虚心翰林拜署延慈曲樂府翻歌法壽音清廟烈文同盛大白雲黄竹異荒淫由來製作當時事千古揄揚始自今病中作身老那堪病更纒小齋欹枕秪高眠堦前秋雨連三日籬下黄花自一年摩詰不知除病法嵇康空著養生篇尚方再賜千金藥慚愧皇恩下九天送羅斛使者郭元恭歸國危檣鉅舶在津亭一曲商歌酒半醒新水滿江過北固好風十日度南溟瘴雲起處桄榔黒毒霧開時島嶼青到日蕃王應勞來皇仁無外說朝廷送詹承㫖致仕還鄉玉堂學士老歸田聖主埀情賜寳篇辟穀張良方遂志㪚金疏廣共稱賢晴江畫舫波濤穏秋浦黄花雨露偏應夢榻前催草詔夜深宫使送金蓮河湟謾興雪峰西靣是羌渾天設竒闗限土門出塞已聞收部落乘槎亦欲問河源霰鋪青草烏雲合風巻黄沙白晝昏聖代安邊有良策只今遺孽自星奔五雲西蜀王讀書處五雲繚繞日華西桞外旌旗簇仗齊綠水接連青瑣近黄鶯飛過畫橋低朝迴席上焚香坐詩就屏間縦筆題獨有鄒枚曳裾客每因獻賦上丹梯送陳中復許寫予真武英殿裏朝天日曽見曹公奏放還老鶴有心歸海國白雲無意戀鄉山九重城外征車遠一曲湖邊釣艇閒為報僧繇休閣筆興來貌取道林顔送張生歸永嘉憐君高興在林泉來伴枯床獨夜禪客館偶逢殘暑雨歸裝應及早秋天山光閃閃三台外海色蒼蒼九斗邊往事舊㳺成一夢臨岐攜手意茫然和程續古秋日見過兼次韻上方高處古禪闗一曲清溪萬疊山松樹不嫌僧共老鞠花應笑客能閒西風岸口孤帆轉落日林邊獨鳥還一自兵餘行樂少且須今日盡歡顔送王惠芳之金陵涼風一棹送君初秋雨荒溪草樹踈十載丹陽舊逰地數封燈下故人書已㸔有志能投筆豈謂無門可曳裾後日天邊見鴻鴈慿將消息報何如入櫟山寫呈無極老禪干戈擾擾客難禁避地來依碧嶂深亂裏獨驚浮世事難中多見故人心千章古木羣峯合一徑長松十里隂更欲移茅入重崦白雲無路可追尋入麻谷入谷初疑路不通一溪流出萬山中化人宫殿非今制野老衣冠有古風黄獨斸時朝雨歇紫芝歌罷莫雲空重陽且莫登高去厭見涇川賊陣紅贈郭子莊之南昌昔觀王粲登樓賦近識林宗墊角巾淮上小山千里夢江南芳草十年春來尋松院棲雲客去作轅門草檄人明日天邊一囘首涼風吹老賞溪蘋故人至十年呉楚念西東豈謂高談此夕同坐對燈花渾似夢驚㸔鬢色已成翁闗河阻絶朋游少天地蒼茫吾道窮西閣小琴閒挂壁且將一曲和松風嵗暮寄琴溪釣者溪上天寒草屋貧古臺幽處獨埀綸已無綠醑消閒日只有青山似故人鯉背好㳺天上國羊裘不染世間塵一年㡬度能相見明日匆匆嵗又新登峩眉亭千尺蒼崖一小亭大江東下入滄溟磯頭牛渚従來險天際峩眉不盡青南北山川分厯厯荆呉檣艦去冥冥十年兵後重來客獨倚闌干兩鬢星曉出呉門曉出呉門有北風片帆高挂一飛鴻如騎鶴背行天上似聽猿聲下峽中楊桞人家迷咫尺蒹葭漁唱隔西東十年霸業同朝露囘首蒼茫故壘空和張光弼留别老來心事向誰論且對青山酒一尊湖上夢醒思舊將江西書去問諸昆可憐漢祖今無廟還喜留侯尚有孫手把過眉笻竹杖與僧閒步出松門和徐大章登南天竺山樓韻徐君為愛南竺幽登此塢口之飛樓鄉山數㸃海東際客路十年湖上頭澗泉翛翛落靜夜風葉淅淅吹高秋便當倚檻和新作為報主人須少留錢塘懷古欲識錢塘王氣徂紫宸宫殿入青蕪朔方鐵騎飛天塹師相樓船宿裏湖白鴈不知南國破青山還傍海門孤百年又見城池改多少英雄屈壯圖天地無情日月徂鳯凰山下久榛蕪獨憐内殿成荒寺空見前山映後湖塞北有誰留一老海南無處問諸孤蓬萊閣上秋風起先向燕京入畫圖送憲上人歸臨海龍華寺鞠花開日問歸舟三載錢塘已倦㳺舊業池臺因夢去異鄉風土為誰留白雲山寺楓林晚黄橘人家海岸秋珍重而翁好懷抱㡬時同倚夕佳樓曉晴坐流止亭俯視山下眠雲有作非烟非霧曉濛濛萬象都歸一氣中深似海時初歇雨白於綿處不隨風得閒漸有還山意偃卧寧無澤物功亭際老僧來倚檻只疑下界頓成空翠微深處為傑上人作翠微深處亂山中築室閒依桂樹叢夜榻泉鳴空澗雨曉園花落滿林風窓含細靄衣長潤橋擁浮槎路不通異域十年天萬里㡬畨歸夢海雲東送吕尚書除兩淛鹽運使曉别都門桞似烟大江積雨水如天朝中舊聽尚書履呉下新迎運使船自古均輸資國用即今綱領任才賢莫言此去南京遠咫尺錢塘是日邊次韻寄延齡峯講主五年不見老齡峯髙枕呉山似卧龍海菜晨充齋鉢供天花晴撲講筵鐘琅函久閟金襕宻石塔新圍寳樹重道貌近來聞瘦甚莫如秋後㸔山容隋堤搔首隋堤落日斜已無遺桞可棲鴉岸傍昔道牽龍艦河底今來走犢車曽笑陳家歌玉樹却従后土㸔瓊花四方正是無虞日誰信黎陽有鼔笳送懷以仁還雪竇此日重歸乳竇峯筍輿十里度松風月明谷口聞猿嘯雨過巖前見虎蹤下界任從滄海變舊房應許白雲封暮年相送情何限安得還山志願同偶作一首新鑿方池水未平晚晴獨自繞池行好花都向雨中盡幽鳥忽來林外鳴科斗黒時初種藕鴨頭綠處欲生萍匡山舊業閒料理更結茅亭此計成送懷以仁法師歸錢塘西湖茭笋夏如玉龍井楊梅舊有名白髮故人千里去青山獨客此時情呼猿洞口蘿龕老石蟹泉頭茗椀清回首天涯來往迹海門潮落又潮生送崔生之錢塘黄鶴仙人過遼海一見賢甥似舅多家世未應憐寂寞丹青曽不廢吟哦天邊白月思鄉夢江上涼風發棹歌為報錢塘舊相識空慚桂樹小山阿山林隠居為周道士作冶城髙處蕊珠林此是仙家第一岑煉藥火殘雲淡淡步虚聲動月沈沈堦前瑶草千年碧門外黄塵十丈深欲訪華陽陶隠士松風閣上聽鳴琴秋江夜泊圖舊逰不記是何年曽向山隂夜泊船鐘磬逺來青嶂外桅檣半出碧灣前蘆洲月白鴈初下竹屋燈紅客未眠欲訪支郎無處覔至今清興尚悠然送福長老五載西行同苦辛扶持老病最情真千山雨雪獨騎馬萬里沙場不見人京國歸來天闕近鄉閭去建法幢新今朝相見仍相别目斷孤雲碧海濵紫虚丹室紫府真人洞裏天住來丹室是丹田玉池細細浮青液金戸霏霏出絳烟緱嶺或來王子晉蒙山時下羨門仙日長别殿香雲合細讀南華内外篇題道士曹􅘉鳴祀恒山贈巻魏公承詔祀恒山更遣仙官列從班六月函香天上去三秋乘傳北邊還笙簫度月金童遠幢節飄空紫鳯閒聞有清詩三百首不將一字落人間送徐生之蜀省覲春風初起送江船西上迢迢路八千巫峽波濤通七澤成都花桞接東川元戎號令飛荒徼公子才華騁少年遥想峩眉山上月夜深應照綵衣筵和蘇平仲見寄蜀中人物在江南喜有文章繼邵菴卧病已聞辭翰苑老來深欲事禪龕留衣寄别猶存跡解帶投機不用參尚恐時人知姓字肯書博士舊官銜西去諸峯千萬層帳房牛糞夜然燈馬河只許皮船渡戎地全慿驛騎乗青葢赤旛迎漢使茜衣紅帽雜蕃僧愧如𤣥奘新歸洛欲學翻經獨未能緇衣埀老忝朝臣未敢辭官愧古人今代有誰為棄物萬方無地不歸仁休論服色青如玉自笑頭顱白似銀它日放歸華頂去政須結社約遺民寄題邵武虞公忠恕齋聞說樵川郡郭西髙齋住近紫雲溪吟成滿地綠隂合睡起一聲幽鳥啼澤物心同時雨洽致君道與古人齊晚來客散重扉靜閒整書籖手自題送項處中歸越詔下山東遠賜歸去官如此世間希黄冠賀監遺風在白首馮郎舊念非一鏡平湖蓮葉艇千巖寒雨薜蘿衣今朝相送長安道目斷秋雲獨鴈飛贈郭子莊之南昌一騎新辭白下橋豫章南去雨蕭蕭元戎妙畧歸孫楚賔客英才重鮑昭近水髙城江勢轉倚天長劍斗光揺湖邊孺子亭猶在應采芳蓀賦大招送曹國公北征上將提軍事北征旌旗百萬出南京直教大漠空沙磧豈但先鋒破敵營瀚海無氷堪飲馬天山有石可鐫名由來衛霍多勲業從此三邊不用兵偶作次王以中韻拄笏高人塘外居作詩直與古人如偶従荷芰香邊得閒向篔簹節上書白露濕堦涼氣早青燈照壁雨聲疎曉來不署金吾事帶劍承明去直廬澹泊軒澹泊軒中澹泊人蕭然一室甘清貧寒到唯披百衲帔饑來但煮三合陳斷薪續牀自可卧熟炙待賔良不嗔細嚼梅花和新句屋頭月出如氷輪全室外集巻六
