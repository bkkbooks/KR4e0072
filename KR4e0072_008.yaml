body:
  text: 全室外集卷八明釋宗泐撰六言巖潭道中古木灣頭漁艇夕陽山下人家風送一溪白浪秋來滿路黃花題竹風過如聞玉佩雨餘似長龍孫靜愛此君高致長日幽齊閉門山中小景二首谷口松杉無路雲中雞犬誰家仙客不歸春老洞門千樹桃花四山一片秋色野客獨坐茅亭渡頭紅葉如雨石上長松自青五言絶句過柳湖憶故人楊生寒雲棲短桞疏雨灑平蕪不見舊詩客空憐水滿湖秋夜窗外芭蕉雨簷前蟋蟀聲如將不平意相訴到天明宿午峯山中未云寂半夜有松濤不寐初來客開門月正高釣朱溪投竿溪水深散髮朝日上高歌不逢人心與晴川廣蓮社鐘方深區內緣久負社中約惆悵莫鐘聲徘徊度林薄梅花莊水軒望清遠不至望君水軒西恨殺前村樹日暮溪雨來扁舟在何處題崖瀑圖飛瀑灑寒氷危梁跨碧層天涯圖裏看白髮未歸僧小景孤村帶寒鴉遠山涵夕霧渡頭人未歸日落風吹樹水竹居圖山人水竹居畫圖看更好十年不歸來茅屋秋風老湘皋烟雨圖翠袖湘江曲秋林淚㸃斑冥冥烟雨裏不見九疑山晚涼晚涼池上亭坐來心似水雨過竹林青風吹豆花紫次白以中西塘即景茅屋夜然燈中有讀書者門外是官街更深猶走馬落日雞鳴埭何人射雉回北湖山月上相送暮鐘來千門甲第高四海狼烟息獨有周亞夫時嚴桞營壁心遠亭此心天地寬幽亭寄閒靜獨坐卷疏簾落花春晝永秋江送别江頭楊桞樹秋雨更蕭蕭可惜長條盡那堪折短條聽松逸響依巖切清聲繞枕寒只疑幽谷底急雨瀉驚湍松風澗水圖泠泠澗中水瑟瑟松上風大音自無聽月白千山空獨竹圖獨立不偶俗直幹排高雲曽過首陽下永懷孤竹君全室外集卷八
  hash: sha256:29f6ed9e66906b19ceebcc5c281e141ca91e5d7237cbf9bb30765dc6bc4fa54a
