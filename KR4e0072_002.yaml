body:
  text: 全室外集卷二明釋宗泐撰樂府長安道長安大道八達分道旁甲第連青雲夜月長明七貴宅春風偏在五侯門貴侯勢熖不可炙烈火射天天為赤家僮盡衛明光宫侍史皆除二千石一朝盛衰忽顛倒夜月春風亦相笑鳳笙龍管坐不來又向東家作新調東家車馬日已多向來賔從無經過貴賤交情捴如此翟公何事嘆雀羅戰城南進兵龍城南轉戰天山道烽煙漲平漠殺氣霾荒徼將軍重爵位天子尚征討不辭鬬死多但恨生男少空城雀啾啾空城雀戀戀空城曲朝傍空城飛莫向空城宿草窠乳子成𡋯土翻身浴不隨鳳凰遊不畏鷹鸇逐野田豈無黍太倉豈無粟食粟遭網羅食黍傷箭鏃丁寧黃口雛飲水懷止足歲晚雖苦飢全軀保微族風入松髙堂初宵山月明長松飀飀奏清聲清聲希微坐獨聽援琴細意寫得成調弦轉軫聲方起忽覺松風生繞指更深鬼哭巖前雲夜半龍吟澤中水一彈一奏聲緩促有似松風時斷續含商流徵清復哀能使幽人聽不足聽不足琴忽罷此時寂寂松無風明月滿天涼露下桂之樹行桂之樹桂生一何偏兩株分立於庭前西株憔悴東株妍桂之樹桂生一何蠧西株方來采其榮東株又復無人顧桂兮桂兮非汝憐縱觀萬事無不然武安堂上席方暖魏其門前秋草芊莫道榮枯長異勢從來反覆無根蒂髙歌感激君不聽請君試看庭前桂俠客行平生重然諾意氣橫素秋拔劍悲風吼上馬行報仇報仇向何處堂堂九衢路突上秦王庭直入韓相府回身視劍鍔血漬霜華薄敢持一片心為君摧五嶽五嶽即可摧此心終不灰恥沒兒女手完質歸泉臺西極天馬歌天馬來自西極流汗溝朱蹄踏石眴目徑度流沙磧天子見之心始降九州欲省民痍瘡宛王何人敢私有二師城堅亦難守等間騎向瑶池前周家八駿爭垂首天間飽秣玉山禾苜蓿春來亦漸多感君意氣為君死一日從君行萬里盛唐樅陽歌漢家天子天馬良羽林十萬何煌煌山川望秩禮孔彰誰言此竟成淫荒舳艫千里長江水江平浪穩頑蛟死摐金伐鼓海上過驚散蓬萊幾仙子朱衣急走傳詔書乘輿所至除田租載拜願君千萬壽歲歲望君一巡狩交門歌不其山頭月將午交門沉沉夜擊鼓博山火爇凝絳煙霓旌𨗳騎來容與玉顔綽約含春花向坐分明君自覩君心有欲神不違側耳傾心聽好語雲收雨散意不傳起望星河獨延佇明朝更入芝房齋神其相之復來下茂陵新樹起哀風五柞宫中淚如雨江南曲泛舟出晴溪溪回抱山轉欲采芙蓉花亭亭秋水逺心非檣上帆隨風豈舒卷但得紅芳遲何辭歲年晚隴頭水隴樹蒼蒼隴坂長征人隴上回望鄉停車立馬不能去况復隴水驚斷腸誰言此水源無極盡是征人流淚積拔劍斫斷令不流莫教惹動征人愁水聲不斷愁還起淚下還滴東流水封書和淚付東流為我殷勤達鄉里春江曲春江沉沉春水滿柳條拂水蒲芽短鴛鴦睡美不畏人日色遲遲素沙暖平陵東赤運中微光不競姦雄竊比周公聖滿朝盡是蒙漢恩忍為新家頌符命當時憤激惟義公挺身一呼生雄風時哉不偶命也窮至今人怨平陵東猛虎行雷霆為威電為目行處腥風動林木利牙如劍生食人婦女獨在家中哭城東少年名射獵聞此揚鞭去還捷却將羅網四散張擬欲當前氣先懾周郎膽氣何獨豪等間射殺仍斬蛟上之回塹崇山堙巨谷發軔甘泉狩維北屬車連連復道平離宫况有三十六蕭關無堠塞無烽單于稱臣月氏服上之回朝萬國巫山髙巫山髙望不極十二危峰倚天碧陽臺神女徒盈盈艷質妖容果誰識襄王荒怪不足徵宋玉微辭豈堪惜至今雲雨自朝昏山鬼哀猿呌蒼壁短歌行白日去茫茫清川流浩浩有生能幾何少壯忽復老王母蟠桃花萎紅不成好扶桑半摧枯枝葉隨瀛島仙人王子喬兩鬢如秋草况聞安期生形容亦枯稿漢武與秦皇一生空自擾短歌詠至言庶以安懷抱苦寒行祝融峰南三尺雪黃河到底頑氷結洛陽賈客船柂膠長安公卿馬蹄裂人言冨貴即可避貧賤從來不相棄昨夜樹頭風簌簌東家孤子號天哭挽歌隂風起枯楊寒日照衰草丹旐辭中堂輀車即周道親戚及鄰里送者皆素縞一歸長夜臺萬古不得曉憶昔盛容儀被服懷美佼今采朽腐餘復為螻蟻擾富貴與榮華滅迹空中烏彭殤久已淪不知誰壽夭古塞下曲候吏過輪臺傳言敵可摧嫖姚揚斾出驍騎治兵來瀚海驚波湧隂山積雪開前軍正酣戰日暮氣雄哉三臺詞二首年去年來易老花開花落相催便是封侯萬户何如儘意三臺采藥樓船久去傳書青鳥不來海水何時清淺蟠桃幾樹花開銅雀臺西陵樹色暮蒼蒼明月相將入御床寂寂帳前歌舞歇幾多含涕憶君王楊柳枝詞赤闌橋外有東風舞態委蛇學不工公子等間來繫馬梢頭斜插酒旗紅萬樹千株汴水隈春風青眼為誰開錦帆曽拂中間過只到楊州竟不回百花洲畔覆青坡苐六橋頭蘸碧波鳳管龍笙春寂寂緑隂終日伴漁歌祖龍歌行祖龍乃好長生者沉璧徒來華山下目斷樓船海氣昏鮑車亂臭沙丘野驪山下錮三泉開泉頭宫殿仍崔嵬當時輸作方亹亹函谷無關小龍死百尺降旗軹道傍十二金人淚如水長安少年行日晚新豐醉酒回玉鞭敲鐙萬人開緑槐馳道橫穿過不管金吾導騎來鬬雞贏得海東青臂向東街覔弟兄白馬翩翩相逐去灞陵原上曉雲平腰下青蛇鞘裏鳴一身長為報讎輕今朝莫共空街語京兆新聞廣漢名從軍行明月照孤營蕭條數聲角開門天宇髙仰見妖星落撫髀一慨慷龍泉立鳴躍少壯方矜武凶渠逺避威力全金鏑迅氣勇鐵鎗飛匹馬搜山去生擒探卒歸拾骨當炊薪淘尸作泉窟平野不見人寒雲鴈飛沒悄悄橫吹悲梅花為誰發草枯馬不肥風烈衣盡破建牙帳外立枕鞍雪中臥倉皇火伴驚校尉點兵過微霜下髙城哀笳破新㺯孰使耳邊來驚我還鄉夢家貧子尚孩寒衣復誰送天雨雪天雨雪出門何所之渡河正遇風浪惡回船少住溪水湄舉頭見飛鳥斂翮欲下無樹枝武溪深滔滔武溪載廣載深我今欲濟兮畏此毒淫武溪滔滔飛鳶跕跕我不先濟兮士不敢涉既濟既涉我師孔武蠢爾有蠻服我王度楚妃歎宫城禁兵夜蔟蔟君王不返宫中宿戎車彭彭雲夢林獵火煌煌漢臯曲章華臺前江水流君心如水無日休虎狼勍敵却不憂草間狐為深讎寄逺曲美人别時春尚早清池坐見芙蓉老湘江水滿鷓鴣飛夢中厯厯相逢道黃金可變石可移此心皎皎終不欺登髙丘而望逺海登髙丘望東溟溟水方蕩激中有怒吼鯨聳脊類峰嶽鼓浪如雷霆噓涎噴沫雲霧冥揚鬐掉尾三山傾腹吞巨舟者百十蝦蟹不足飢腸撑奈何驕悍當海橫官漕賈舶不敢行鮫人織綃機杼停神仙局蹐居蓬瀛天吳既辟易龍伯亦震驚徒為蟲族長空有水神名制御一顛倒含羞請尋盟吁嗟彼鯨何爾獰恃其險惡雄勢成若失此海水何以藏其形使居陸阜間轉眼遭剝烹海濵壯士瞋目瞪拔劍欲往心懸旌曷不訴之於上帝天威下殛無遺生立見海水清且平海光不動青瑶璚王子喬王子喬好神仙吹笙駕白鶴遨遊上青天青天一去三千年七月七日緱山巔下士慕之空爾憐寧知有氣凝丹田獨漉篇獨漉復獨漉水深泥更濁水深終見底泥濁不見石翩翩者鳬鳥引子遊水湄我豈無矰繳悵然為爾悲南山有喬木北山有梓樹此物本無情俯仰如有度羅幃空堂上塵暗蛛絲繞倚門久踟蹰慷慨不可道床頭龍鱗劍中夜躍鞘頻父讎不及報空愧七尺身斑斑深山虎白日下林麓豈敢避生獰人能食其肉三閣詞復道麗明霞阿房未當奢半空傳笑語長夜後庭花檻車出城去望閣暫回頭昔道千年樂今成萬古愁墓上華墓上華開滿枝行人看花行為遲行人有恨花不知不生名園使人愛却生墓上令人哀誰家此墓臨古道寒食無人來祭掃莫是東君惜無主遣此間花伴幽兆聊持一杯酒酹爾泉下客今日此花開正好但恐明日花狼籍人生似花能幾時古人今人皆可悲道傍屋道傍誰家有古屋主人不在行人宿門戶蕭條四壁空野草依然映階緑春燕歸來細相認繞屋低飛疑不定徒令獨客久咨嗟無復髙堂樂繁盛一從兵火照坤維十家九家無孑遺願留此屋行人宿莫問主人歸不歸南鴈詞胡鴈向南飛八月湘江道水清菰米香兩岸被紅蓼栖息已自安飲啄良易飽不憂羅網危方矜羽毛好故鄉窮漠陲歸夢空杳杳蕭條古塞春雪深沙浩浩烏啼曲并序天台王文起以故官例遷汴梁念其親老不得朝夕養思慕彌篤其寓邸旁有古槐樹俄羣烏集啼其上久而弗去及文起以舍壞遷其居烏亦隨之其孝感有如此者豫聞而異之遂作烏啼曲一首客舍門前古槐樹羣烏啞啞啼不去烏啼解知人意苦遷客思親朝復暮五年生死無消息一聞烏啼淚沾臆汴水東流白日飛老親在南兒在北南地靈鵲北地烏烏啼報有平安書善世曲迎佛體虛凝兮真常妙應化兮無方啓崇筵兮日吉辰良禮孔修兮眇躬齋莊目眷眷兮遙望感必通兮在誠叶祥紫磨軀兮白玉毫光駕雲車兮旌幡侍傍眷閻浮兮斯格仰盛容兮洋洋昭信曲獻香幣維此妙香五分普熏筐篚斯實有玄有纁物微禮具敬奉慈尊庶祈鑒只展我殷勤延慈曲初獻供泥連先饋純陀後供進兹肴膳間奏鼓鐘皿器斯潔黍稷惟豐無逺弗屆至誠乃通法喜曲亞獻供仁風廣被春日載熙天人共仰顯幽靡遺豈惟華竺覃及島夷因齋以頌於禮攸冝禪恱曲三獻供禮誠在敬三獻靡加釋尊燕喜樂奏無譁明徵瑞應昭著光華冥幽溥濟蒙被禎嘉遍應曲徹豆飶馨既歆籩豆尚列始終匪懈肅雍以徹禮文有序樂舞有節洋洋在上無意弗逹妙濟曲送佛赫其臨兮優遊俄復去兮難留八部從兮如毛音謀儼先後兮靈輈凝睇兮夷猶冀慈雲兮遐周善成曲望燎瞻燎于西祥熖騰空惟饌與帛遄逹靈宫仰慈于玄祀禮有終企而眷之大地真風獻幣禮有至重無踰法施浩乎巨海孰知其際欲致微𠂻敬奉兹幣以報以祈式嚴祀事獻茶有茁者茗于彼先春泉甘且潔薦此芳新味相本空識含根塵不腆其物所獻惟寅讃佛上下兜率兮悲智融迹垂化兮誕王宫金園幽兮寶樹重浴聖體兮香泉濛角衆伎兮伊誰同世所習兮殫精通覩四相兮心忡忡夜逾城兮登雪峰一麻食兮苦行工羣魔却兮波旬降廓妙悟兮星曈曈託修證兮成厥功應世間兮月行空燭羣幽兮開衆蒙海之巨兮罔不容道無上兮稱太雄讃佛中成覺道兮坐寶蓮金容赫兮螺髻旋威德聖兮福慧全三身具兮萬行圓演一音兮龍象筵應羣機兮施化權由雜花兮至鹿園大小乘兮假蹄筌彼諸子兮悔應愆運大車兮等無偏囑王臣兮法流傳末拈花兮妙無言三百會兮五十年度弟子兮陳如先量虛空兮知其邊讃功德兮何由宣讃佛下猗正體兮住靈山順世間兮處泥洹雙林白兮浩漫漫天人憂兮發長嘆香樓成兮架寶棺火光煜兮設利繁應軀謝兮聲教存崇遺範兮集法言化周流兮亘五天後千祀兮來真丹道無為兮妙莫論顯幽利兮神明完資世治兮輔化源善以勸兮惡以悛佩聖謨兮矢弗諼願永劫兮垂無垠歌福應大哉覺皇乘悲願以度人視羣生如赤子運廣大之慈仁降福垂祐若時之春有萌必逹其生蓁蓁今日何日漸溉膏澤愈樂且恂尚克均于衆庶匪獨萃于一身全室外集卷二
