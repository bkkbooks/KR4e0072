body:
  text: 全室外集巻九明釋宗泐撰疏清遠和尚住淨慈山門疏學者得師猶衆流歸乎大海至人應世如明月行乎太虚為衆生到處開堂念五濁隨機說法某才髙行輩望重叢林胷中鉅浸稽天孰窺涯涘眼底豫章拔地衆仰丰標一甌兩躍嘉名四海共傳盛舉化馴異類訥公顯神用於雲峯學㑹諸宗永明逞雄才於南宕既踵乃兄故武必追大父遺風應真五百軀不用施呈􅇊倆大法二千載敢煩整頓宗綱慧日光輝聖圖廣大實章法師住上竺諸山山門二疏宗師負大法之重遁迹非髙人才為當世之賢超遷不次雖用捨無闗於我而出處故有其時某物外通才法中偉器入慧光室而味甘露洞開真源承五色詔以館鴻臚發明奥義與其化行中呉之久孰若位冠五山之雄妙演一乗非藏非通非别互明三觀即空即假即中况竹屋有先人敝廬而白雲乃昔年分座載脂載牽早駕指南之車將翺將翔願接埀雲之翼共扶末運敢不同心翊祖髙行絶塵始現普門境界辯才碩徳邁衆肈開教海淵源従兹冠冕諸宗仰止風規百世代多作者今見其人某器宇恢宏才學優贍明宗辯㫖孰能相抗立幡赴詔講經何異忘言揮尺况教府委宗極之重而吾徒得北道之賢由梁父登泰山諸峰在下駕大車歸寳所家業斯存觀四衆之機宜闡一代之時教桂子月中落分來鷲嶺清香鳥語山容開坐見白雲深處一音普被萬壽無期業海和尚住天衣杭諸山疏有序業海和尚以耆年碩徳居㑹稽大唱佛智之道化洽鄉里道滿江湖今年八十六矣而容貌粹美康强無恙猶不倦槌拂以接物利生為已任實東南一善知識也論者咸謂必得大道塲處之乃克稱其施設耳比者教府命至延居郡之天衣禪寺為衆開堂四方衲子聞其出世如景星鳯凰莫不爭先快覩故吾三宗之士相率具疏為賀盖賀學者之得師而非為師賀也大法埀秋揺落祗園千樹老師出世瑞現優曇一華不圖漢官威儀乃有是翁矍鑠某神觀超詣道行孤高南屏當時千百象龍舊交盡矣鏡湖一代風流人物今誰過之大鵬舉翮便高蟠桃開花何晚鄉閭有待非支遁購沃洲之山家世克昌即天衣大雪竇之道宜兠率見素翁而下拜如西伯得吕望而載歸揺六震雨四華願聞提唱朝三呉暮百越誓欲従㳺約之和尚住育王杭諸山疏訥公在圓通不奉朝天之詔大覺來玉几特受還山之書惟出處之無恒信古今之同致某行髙前哲徳重當時江西八十人曽見象龍之㑹廬山㡬千􅌇任從􅆐鶴之驚快哉順水張㠶干以過家上塚兄弟一門盛事棣萼相輝祖翁三代遺風竹篦重舉痛埽語言闗鍵孰窺妙密鉗鎚人境俱竒大坐殊勝吉祥之地東西相望載歌秋水明月之章言不尚文禮以通好木菴和尚住天童杭諸山疏西丘晚住天童門庭益峻暮翁閒居紫籜聲價愈髙起家有二難聯裾接武見諸孫奕葉某言超象外行冠叢林三聖大孤大覺大賖克明授受九峯在前楊岐在後益喜激揚未誇金地招歸合羨青衣給侍正宗可慟見破沙盆話重行大雅無聞聽師子觔琴再奏走四方之學者追三代之遺風一身繫大法重輕世事堪忽千里想美人襟度道義不愆匪溢其辭用脩于好雲天章住四明香山杭諸山疏青錢付孤注一擲有盧雉之雄鸞膠續斷弦三嘆起宫商之妙所慨洞宗危甚必得竒士振之某徳性溫良語言簡拔擅芝山之獨秀得自鏡之密傳桂花飯客棃子啖仙久分真味銀椀盛雪明月藏鷺大闡𤣥猷起家繼隰州高風結社得香山勝地法道重任冀一身以當三千雲路孤騫去六月而摶九萬少効彈冠之慶尚期秣馬以従辯無言住溫州僊巖杭諸山疏取貳師以得宛駒樹功甚偉入趙營而立漢幟出竒無窮惟志士克展其材而通人乃識夫變某語絶㵕漏理造𤣥微嘉禾二甘露門我入其室靈山一大藏教孰究其源買臣懷印綬以示邸人萬囬著錦袍而歸鄉里楞嚴破讀巖泉尚為舉揚證道忘言江月本來無照足任單傳之重用増吾道之光提破沙盆握黒竹篦總歸妙用焚迦葉衣碎維摩座獨脫全機山川不阻甌呉書疏尚傳魚鴈調用明住福州鼔山杭諸山疏巖頭在鄂嗣徳山不肯徳山雪峯歸閩出鳶嶺復入鳶嶺道既行於鄉里跡未泯於江湖孰謂斯時乃逢作者某詞傾三峽氣吞諸方潛子上書萬言心存大法善財歴城百所學無常師久聞持斧住山猶自領徒行脚機縁再舉聖箭射入重城山水昔游輕車駕就熟路豈無望塵下拜亦有負弩前驅乗天風觀海濤一何壯也布慈雲洒甘露衆所望焉勿以遐陬遂疏交義西白和尚住天界杭諸山疏大覺於汴京演法累受宸奎圓悟就廣陵開堂特頒師號眷兹禪門獨冠欽承帝命維新振耀古今光輝宗教某識高先徳名重當時早追圓照遺風已讖法雷震地壯游雲門故里共驚慧辯縣河今何時欲安眠為大法宜再起南山𤣥豹七日霧以澤文章北溟大鯤萬里風而舒羽翮寔賴匡宗之重匪惟觀國之光喜動天顔蕩茶杯而忘世禮力行祖令握竹篦以顯家風千載罕逢諸方交賀觀靈原住北平慶壽京刹疏竹林諸師實嗣東山正脈慶壽名刹總領臨濟一宗昔聞北産人材之多今見南方法道之盛粤維此舉適際昌時某淮海明珠龍淵赤鯉精神烱烱清氷置寒露玉壺文章翩翩阿閣舞朝陽丹鳯克紹祖庭之舊欽承帝命之新折一蘆而渡江不妨㳺戱將三篾以束肚未覺艱難笑彼匾頭之領徒㳺南愛夫鐵脚之傳宗向北飛虹橋畔到時楊桞依依黄金臺前徃事烟雲漠漠寸心如水千里同風濟汝舟住虎跑諸山疏神駒墮地志在騰驤利劒吹毛功由淬礪既為剸象斬蛟之用必騁追風掣電之材某人表堂堂才華􅂱􅂱用紙衣抄冷泉剩語如玉如金繞禪床轉大藏全經非華非梵取青紫如拾地芥乘風雲以化天池趙州在北雪峯在南光輝諸友周公拜前魯侯拜後榮萃一門握竹篦便展家風負栲栳徑入閙市百神共仰東峯石墖猶存諸祖有靈南屏喬木在望庶幾振起相與周旋琮蘊山住溫州天寧諸山疏真覺至曹溪一宿即還永嘉雪峯於江外久遊亦歸閩海論其道則播於宇宙計其化乃盛於鄉閭由古若兹匪今獨爾某嘉名藉甚美行卓然受經問道皆出一師建刹移幢俱於故里盖欲假扶宗之力非徒羨衣錦之榮内不避親外不避讎舉無不當出則為人處則為已志有攸従况喬木有先人故廬而某丘乃舊時逰處松風江月雅宜世外逍遥鴈宕龍湫敢効胷中竒勝有如曒日毋渝此盟昕東谷住台州靈鷲杭諸山疏一釣而連六鼇海水震蕩再見而封萬戸聲譽蜚揚不惟絶類離倫亦乃驚世駭俗某襟度沖曠言論髙閎飲薑杏湯鐔津豈知真味持鈯斧子石頭未是作家欲移茅舍深居爭奈諸方交聘起天香之家世此有人焉分鷲嶺之祖燈屬之子矣所羨過家上塚非誇駟馬髙車剖破藩籬新展一家之好混同文軌遠傳千里之音欲踐斯言請自今始康穆菴住福州開元杭諸山疏神鼎幽棲南嶽豈有意於住山天目髙卧西丘亦無心於應世皆敦迫而就道欲利益以及人出處得宜古今同體某氣劘壁壘舌巻波濤辭徑塢以見南堂盡翻窠臼自明巖而移雲嶺密運鉗鎚雖談禪病以暫閒當為佛法而再起道過雪竇宜勇禪師之在保寧名重閩王即稜道者之遷長慶黒豆法星移斗換破沙盆玉應金舂琴瑟必解更張當施妙指甌越自相攻擊庶革囂風雖曰阻脩靡愆音問因了菴住越州明化杭諸山疏簫韶正音聞者心閒而體靜醍醐上味飲之神澹而慮清明師登席來學爭歸賢士用時善類相賀某宗門鉅敵海内勝流為法忘軀類潛子抱書詣闕唆人喫棒笑睦州古寺掩闗甞憶蓴菜以歸呉匪資章甫而適越惠文直下宜如羽嘉鳯凰了幻門中有此封胡羯末瞻㑹稽千峯堪數視錢塘一葦可航丞相遺徳未衰雲衲有賴國師化風不墜吾子其承欲尋牛耳之盟豈限衣帶之水真性存住上虞等慈杭諸山疏埀棘璧屈産乘寔能照夜追風雲夢竹棠溪金宜作勁才利器既為人所貴者必有時而用之某柏操松姿錦心繡口江左早稱獨步蒼鷹脫鞲呉中閒住多年老驥伏􅇫競㸔棚頭傀儡孰窺爨下焦桐春到人間芽枿自然萌達雨施萬物風雲先為馳驅莫因茘子思閩且倚柂樓行越山川形勝有虞之徳尚存人物清髙支遁之名不朽力𢎞法道大慰宗盟楩用堂住四明彰聖江湖疏切謂倖門既啟庸孺寖登旦評不行耆碩見棄絳縣老辱在泥途雛道人動成阡陌勢之若此人其謂何粤若用堂禪師學貫諸宗理探衆妙才美而不外著業成而道益窮四十餘年湖海宿衲厥志靡伸有識所隠今移彰聖雖曰序遷亦未饜衆望然古徳應縁貴行其道位之高下固弗足較吁百金之刀不斬蛟兕試用於雞豚千里之馬不騁康莊緩步於邑里利鋒逸足綽有餘裕矧今樷林不振人物眇然得一士以匡宗俾善類而吐氣亦曰幸焉庸可賀已岳原靈住台州鴻福杭諸山疏蓊萼首創真如吾道東矣佛照初居鴻福物論翕然至今猶有耿光當代豈無作者某儀矩端重才智優長汪汪萬頃之陂孰能澄撓昂昂九臯之鸐迥脫樊籠三處鈯斧住山十載錦衣行晝涼風生畫角昔人言句如新翠微開竹房先師面目尚在起家聲於已墜振法道於方危胡馬北越鳥南信故鄉之可樂日暮雲春天樹眷交義之難忘欲寫永懷尚馮尺素悟空叟住淛江萬壽諸山疏束帛見徵誰是鑿坯以遁上書自獻類多懷綬而歸方欲致北山之移其可廢汝南之論聿觀斯舉迥出常流某行檢清脩風神簡遠門前一湖水見永明宗㫖厯然支那四百州笑寳掌行脚事畢思橘向洞庭深處觀瀾到呉地盡頭炊無米飯接不來人方稱好手披忍辱衣據法空座合闡𤣥機等閒把定要津何妨混居閙市木𤓰種草挺然又出一枝祗樹園林衰甚無如今日庶幾戮力相與扶持竺芳和尚住湖州道場京都諸山疏聖皇重道起遺老於海濵吾宗得人囘真風於像季兹既出當治世矧曰簡在帝心某行解相應語黙一致用斷薪續床脚貧無卓錐緘白紙到峯頭氣劘高壘五百僧中而得一士三千年後乃見蟠桃呉越令行不妨隨處作主風雲際㑹固知藏器待時舉足即是道場稱性無非禪悅上雲峯下幽谷地位清高東啟明西長庚光輝交暎有懷千里彼美一方性源和尚住金山京都諸山疏切謂古有道知識多晦跡自高弗就師位其志毅不可奪及聞善言或乃俯徇以汾陽之堅卧聰公一言矍然而起以神鼎之閒靜湘人一語舍已以從卒成樷林以𢎞大法然出處一致寧貳吾心應化隨縁豈違衆望惟性源和尚深徹法源洞明宗眼行足以服人徳足以化俗自金鵞散席即奮䇿長邁放情物表雖屈從龍河分座而累却諸刹之聘比者金山具疏請師開堂師猶力辭耆耄之士以汾陽神鼎出處勸之始黽勉屑就嗟乎蘭生幽谷香氣遠揚玉袐重厓光輝外耀孰得而揜之哉惟上承祖道之重下以副學者之望焉耳淳復初住蘇州萬壽京都諸山疏呉下禪林全盛時不復見矣海内人物老成者能幾何哉故選用以得士為優而責任以匡宗為重適當繼發所賴作興某妙理深談𤣥機獨運舊㳺如夢蘭亭勝迹已陳往事堪論石城潮痕尚在累却諸方之聘猶懷一室之安素老與兠率交談句中有眼舉公見瑯琊用處語外無𤣥宜乎内不避親况爾人皆曰善茂苑繁華地更聞迭奏塤篪江東日暮雲其奈多情猿鶴力𢎞少室單傳之道當效華封三祝之辭明性源住宣州護國疏卧壑長松豈負千尋之質鳴臯老鶴寧無萬里之心此行雖未稱其設施衆論盖欲舉其遺佚幸紆象步早赴法筵某妙語春溫生機電掣龍門獨步少年志剉一國之師猊座高陞兩㑹話行三佛之地惟長材善於應世而清議足以服人移茅舍入深居固非至計負栲栳行閙市迺見作家故人歌日暮碧雲往事問桑田海水重來何晚眷杜牧尚念昔㳺得位非榮比桓彛可依先隴作興叢席密贊蘿圖瓊蘊中住台州多福疏方將軍肇興禪刹偉勣儼然韶國師大闡化風嘉聲籍甚千古豈無繼者一門尚有諸孫某學問精深風神秀整凌霄峯頂親當井底蓬塵之機靈鷲山中慣詠月中桂子之句不起妙嚴本座即登多福覺塲雪峯盛化七閩久㳺外郡永嘉親承六祖即返故鄉當逢交友下車豈羨邦君負弩維桑維梓尚懷先世植時某水某丘總是少年游處丕揚至化上祝蕃禧智海巖住太平萬壽京刹疏有序國初有制以應天太平鎮江寧國徽州廣徳六府所屬州縣止留一寺一觀令僧道㑹集同居於是太平府萬壽寺在裁減例僧既集居光孝其寺遂虚有司令黄冠居之洪武七年秋上特詔復為寺寺之老成合衆議曰昔為徒居分十八院衆餘三百其志不一寺用弗振今所存六十一人宜易為十方禪刹延名師主之講行古規隂翊王度以無負皇上復寺之本意且聞前百福海巖智公禪師耆年宿徳菴居乳山緇白嚮化具禮迎請必能俯従衆志翕然狀申禮部俾天界住持覈實符下禮請吾屬覩兹盛舉有光宗教義不得無辭遂序其事以致勸焉摧邪顯正降九重之徳音革律為禪得六卿之符命幸賴聖朝崇教復喜法社得人恭惟某心地坦夷行門清淨鍾阜何曽說破妙挾機先姑溪不是生縁獨超物外與其移茅舍深入孰若著錦衣晝行排闥直言何時而安眠也據鞍勇往是翁尚矍鑠哉雲本無心出山鏡非有意鑑物恢張家法破砂盆玉振金聲力闡宗乗栗棘蓬東抛西擲克全厥美不負所期性源和尚住靈隠京刹諸山疏并序性源和尚居金山廢刹五載大旺其化今靈隠以虚席聘之使者疏幣往返數四金山徒衆固留弗予而兩寺爭之不少置或有言於師曰金山藉師復振靈隠亦廢刹也一往起之豈不可哉師乃幡然俯從即趣辦戒途吾屬聞而壯之其與請留圓照明覺故事盖相類於是作疏抒其意以為法門賀或出或處何有局於方隅固請固留咸謂私我知識雖則攀轅卧轍其如奉幣致書不意斯時乃聞盛事某話行湖海望重樷林徳雲不下妙高豈無方便永明升住靈隠亦徇時縁起宗綱於已頽回狂瀾於既倒借師植福圓照曽慰杭人對衆揚言明覺終歸乳竇况是本色宗匠宜居絶勝覺場如來禪祖師禪真風再扇我北海君南海明月一方焦山復西源住金山京城諸山疏有序性源禪師既赴冷泉乃舉焦山西源復公禪師補其席盖西源居浮玉甚久凡所設施皆可稱述且於京口之人有大縁契求善繼者莫西源若也故於此舉僉曰攸當於是具疏以致賀焉金鰲之於浮玉其猶季孟之間妙喜之於應菴本是叔姪之行孰謂傳持不可兹焉舉代尤宜某學有㫖歸言無縁飾半生多居京口盛見父子一門故鄉原在天台素稱人境雙絶據形勝當南北之要化瓦礫為釋梵之宫慈受由浮玉而登蔣山學徒益衆别峯自金鰲而遷徑塢聲價彌髙雖弗較位之崇卑亦惟在縁之去住少迂脩步爰繼芳猷何時安眠哉便當投袂起矣清風半㠶耳自可遡流從之力任單提光揚李運跋王達善梅花詩詩乃性情流至者茍本性情而發則如風行水面自然成文今王君達善梅花詩是已况其天姿英邁出人意表一夕之間百篇具就既敏且美雖七步之才不足多也故書之左方以告賞音者焉全室外集巻九
